<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>✨ Mind Map</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ff:'Outfit',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--ff);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;transition:background .4s}

/* ── THEMES ── */
body.t-litebrite  { --bg0:#000000; --bg1:#050508; --bg2:#0a0a12; --bg3:#0f0f1a; --border:rgba(255,255,255,0.08); --border-hi:rgba(255,255,255,0.16); --text:#ffffff; --text2:#b8b0d8; --text3:#48406a; --accent:#ff00ff; --accent2:#00ffff; --title-a:#ff4488; --title-b:#ffee00; --title-c:#00ffcc; }
body.t-goldenhour { --bg0:#0a0400; --bg1:#110700; --bg2:#1a0d00; --bg3:#251200; --border:rgba(255,140,0,0.12); --border-hi:rgba(255,140,0,0.22); --text:#fff5e6; --text2:#cc9966; --text3:#6b4420; --accent:#ffc800; --accent2:#ff6400; --title-a:#ff6400; --title-b:#ffc800; --title-c:#ff6400; }
body.t-deepocean  { --bg0:#020810; --bg1:#040e1c; --bg2:#061628; --bg3:#0a1f38; --border:rgba(0,180,255,0.12); --border-hi:rgba(0,180,255,0.22); --text:#e0f4ff; --text2:#6aaac8; --text3:#2a4a62; --accent:#00b4ff; --accent2:#64dcc8; --title-a:#00b4ff; --title-b:#64dcc8; --title-c:#00b4ff; }
body.t-forest     { --bg0:#040804; --bg1:#080f04; --bg2:#0e1808; --bg3:#162010; --border:rgba(80,220,80,0.1); --border-hi:rgba(100,255,80,0.18); --text:#e8f8d8; --text2:#7aaa60; --text3:#3a5a28; --accent:#78ff50; --accent2:#ffc832; --title-a:#78ff50; --title-b:#ffc832; --title-c:#78ff50; }
body.t-princess   { --bg0:#0d0008; --bg1:#140010; --bg2:#1e0018; --bg3:#280020; --border:rgba(255,100,200,0.14); --border-hi:rgba(255,140,220,0.26); --text:#fff0fa; --text2:#e080c8; --text3:#7a3a60; --accent:#ff60c8; --accent2:#ffaaee; --title-a:#ff60c8; --title-b:#ffaaee; --title-c:#cc40ff; }

#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:9999;display:none}


#done-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.7);background:var(--bg1);border:2px solid var(--accent);border-radius:24px;padding:26px 34px;text-align:center;z-index:9998;box-shadow:0 0 60px rgba(0,0,0,.6);pointer-events:none;opacity:0;transition:opacity .25s,transform .3s;min-width:230px}
#done-toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
#done-toast-emoji{font-size:46px;display:block;margin-bottom:8px}
#done-toast-text{font-size:17px;font-weight:800;color:var(--accent);letter-spacing:.03em}
#done-toast-sub{font-size:11px;color:var(--text2);margin-top:4px}

#bg-canvas{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:0;display:block}
#shell{width:100%;max-width:680px;background:var(--bg1);display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;position:relative;z-index:1;border-left:.5px solid var(--border);border-right:.5px solid var(--border);transition:background .4s,border-color .4s;overflow:hidden}
@media(min-width:700px){body{padding:16px}#shell{min-height:calc(100vh - 32px);border-radius:22px;border:.5px solid var(--border-hi)}}

/* THEME-SPECIFIC VISUAL DIFFERENTIATORS */

/* ── Shared map canvas ── */
#map-canvas{position:absolute;inset:0;pointer-events:none;z-index:0;width:100%;height:100%;display:block}
#view-map{position:relative}

/* ── PER-THEME NODE PERSONALITIES ── */
/* Lite Brite: sharp corners, neon inner glow */
body.t-litebrite .node-card{border-radius:6px!important;border-width:1.5px}
body.t-litebrite .node-card.selected{box-shadow:0 0 0 2px var(--sel-c),0 0 18px var(--sel-g),inset 0 0 12px rgba(255,255,255,0.04)!important}

/* Golden Hour: warm badge shape — slightly squircle */
body.t-goldenhour .node-card{border-radius:10px 10px 8px 8px!important}
body.t-goldenhour .node-label{letter-spacing:.07em}
body.t-goldenhour .node-connector{background:linear-gradient(90deg,var(--accent2),var(--accent))!important;box-shadow:0 0 6px var(--accent)!important}

/* Deep Ocean: horizontal capsule — wide and rounded */
body.t-deepocean .node-card{border-radius:20px!important;padding-left:14px!important;padding-right:14px!important}
body.t-deepocean .node-connector{border-radius:0;height:1.5px;opacity:.6}

/* Forest: organic uneven corners */
body.t-forest .node-card{border-radius:12px 6px 14px 6px!important}
body.t-forest .node-dot{border-radius:2px;transform:rotate(45deg)}

/* Princess: full pill + shimmer border animation */
body.t-princess .node-card{border-radius:999px!important;padding-left:16px!important;padding-right:14px!important}
body.t-princess .node-card.selected{box-shadow:0 0 0 2px var(--sel-c),0 0 20px var(--sel-g),0 0 40px rgba(220,60,255,.15)!important}
@keyframes shimmer-border{0%,100%{border-color:rgba(255,96,200,.4)}50%{border-color:rgba(204,64,255,.7)}}
body.t-princess .node-card{animation:shimmer-border 3s ease-in-out infinite}
body.t-princess .node-card.selected{animation:none}
body.t-litebrite #header::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,0.015) 3px,rgba(255,255,255,0.015) 4px);pointer-events:none;z-index:0}
body.t-litebrite #header-title{font-size:20px;letter-spacing:.08em;text-shadow:0 0 20px rgba(255,0,255,.6),0 0 40px rgba(0,255,255,.4)}
body.t-litebrite .node-card{border-radius:8px}
/* scanlines: use a fixed overlay canvas instead of ::before to avoid blocking stacking context */
body.t-litebrite .node-card{box-shadow:inset 0 0 0 0 transparent}
body.t-litebrite .node-card:hover{filter:brightness(1.08);box-shadow:0 0 8px var(--sel-c,rgba(255,0,255,.2))}
body.t-litebrite #statusbar{border-top:2px solid transparent;border-image:linear-gradient(90deg,#ff2020,#ffc800,#00ff78,#00c8ff,#ff00ff) 1}

/* ── GOLDEN HOUR ── */
body.t-goldenhour #header{background:linear-gradient(180deg,rgba(30,8,0,1),rgba(17,7,0,1))}
body.t-goldenhour #header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 150%,rgba(255,140,0,0.12),transparent 70%);pointer-events:none}
body.t-goldenhour #header-title{font-size:19px;letter-spacing:.04em}
body.t-goldenhour .node-card.selected{box-shadow:0 0 0 2px var(--sel-c,#ffc800),0 0 20px var(--sel-g),0 2px 12px rgba(0,0,0,.5)!important}
/* warm ember glow seeping up from the bottom of the map */
body.t-goldenhour #view-map::after{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(0deg,rgba(255,80,0,0.04),transparent);pointer-events:none;z-index:0}
body.t-goldenhour #statusbar{border-top-color:rgba(255,140,0,0.25)}
body.t-goldenhour .node-connector{height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent))!important}

/* ── DEEP OCEAN ── */
body.t-deepocean #header{background:linear-gradient(180deg,rgba(2,12,28,1),rgba(4,14,28,1));overflow:hidden}
body.t-deepocean #header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(0,180,255,0.1),transparent 60%),radial-gradient(ellipse at 70% 0%,rgba(100,220,200,0.07),transparent 60%);pointer-events:none}
body.t-deepocean #header-title{font-size:19px;letter-spacing:.03em;text-shadow:0 0 20px rgba(0,180,255,.5),0 0 40px rgba(0,220,200,.3)}
body.t-deepocean .node-connector{border-radius:0;height:1.5px}
/* deep sea pressure vignette */
body.t-deepocean #view-map::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,transparent 55%,rgba(0,10,30,.5) 100%);pointer-events:none;z-index:0}
body.t-deepocean #statusbar{border-top-color:rgba(0,180,255,.2);color:var(--accent2)}
/* wave line on theme bar */
body.t-deepocean #theme-bar{border-bottom:1px solid rgba(0,180,255,.18)}
body.t-deepocean .node-card:hover{box-shadow:0 0 12px rgba(0,180,255,.15),inset 0 0 20px rgba(0,100,180,.04)}

/* ── ENCHANTED FOREST ── */
body.t-forest #header{background:linear-gradient(180deg,rgba(4,12,2,1),rgba(8,15,4,1));overflow:hidden}
body.t-forest #header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 100%,rgba(80,255,60,0.08),transparent 55%),radial-gradient(ellipse at 80% 100%,rgba(255,200,0,0.06),transparent 55%);pointer-events:none}
body.t-forest #header-title{font-size:19px;letter-spacing:.03em;text-shadow:0 0 16px rgba(100,255,60,.5),0 0 32px rgba(255,200,0,.3)}
body.t-forest .node-dot{border-radius:2px;transform:rotate(45deg)}
/* ground fog / mist rising from bottom */
body.t-forest #view-map::after{content:'';position:absolute;bottom:0;left:0;right:0;height:180px;background:linear-gradient(0deg,rgba(20,60,10,.18),transparent);pointer-events:none;z-index:0}
body.t-forest #statusbar{border-top-color:rgba(80,220,60,.2);color:var(--accent)}
/* mossy dashed connectors */
body.t-forest .node-connector{border-radius:2px;opacity:.7}
body.t-forest .node-card:hover{box-shadow:0 0 14px rgba(80,255,50,.1),inset 0 0 20px rgba(20,80,10,.06)}

/* ── PRINCESS ── */
body.t-princess #header{background:linear-gradient(180deg,rgba(20,0,16,1),rgba(14,0,10,1));overflow:hidden}
body.t-princess #header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(255,80,200,0.12),transparent 55%),radial-gradient(ellipse at 70% 0%,rgba(200,60,255,0.09),transparent 55%);pointer-events:none}
body.t-princess #header-title{font-size:20px;letter-spacing:.06em;text-shadow:0 0 20px rgba(255,80,200,.6),0 0 40px rgba(200,60,255,.3)}
body.t-princess .node-connector{border-radius:999px}
body.t-princess #view-map::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,60,200,0.04),transparent 60%);pointer-events:none;z-index:0}
body.t-princess #statusbar{border-top-color:rgba(255,100,200,.25);color:var(--accent)}
body.t-princess .node-card{border-radius:999px}
body.t-princess .node-card:hover{box-shadow:0 0 14px rgba(255,80,200,.15)}
#header{padding:10px 14px;background:transparent;border-bottom:.5px solid var(--border);position:relative;z-index:10;transition:background .4s;overflow:hidden;min-height:58px;display:flex;align-items:center}
/* All direct header content must sit above the bg-canvas (z-index:0) */
#header-title,#add-row,#btn-row{position:relative;z-index:1}
#header-title{font-size:17px;font-weight:800;letter-spacing:.02em;margin-bottom:0;background:linear-gradient(90deg,var(--title-a),var(--title-b),var(--title-c));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 5s linear infinite}
@keyframes shimmer{to{background-position:200% center}}

/* Floating bottom add bar */
#fab-bar{position:sticky;bottom:0;background:color-mix(in srgb,var(--bg1) 96%,transparent);border-top:1.5px solid var(--border-hi);padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom));z-index:10;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);flex-shrink:0}
#fab-input-row{display:flex;gap:7px;align-items:center;margin-bottom:7px}
#fab-btn-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#fab-btn-row::-webkit-scrollbar{display:none}
#add-input{flex:1;min-width:0;font-size:16px;font-family:var(--ff);font-weight:500;padding:10px 14px;border-radius:13px;border:1.5px solid var(--border-hi);background:var(--bg2);color:var(--text);outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s}
#add-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)}
#add-input::placeholder{color:var(--text3)}
.btn{font-size:11px;font-family:var(--ff);font-weight:700;padding:8px 13px;border-radius:12px;border:none;cursor:pointer;white-space:nowrap;letter-spacing:.03em;transition:opacity .15s,transform .1s;flex-shrink:0;-webkit-appearance:none}
.btn:active{transform:scale(.92)}
.btn-add{background:var(--accent);color:#000}
.btn-blank{background:var(--bg3);color:var(--accent);border:1.5px solid var(--border-hi)}
.btn-root{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-icon{background:var(--bg3);color:var(--text2);border:1px solid var(--border);font-size:15px;padding:8px 11px}
.btn-subtle{opacity:.45;font-size:13px;padding:6px 9px!important}

/* THEME SWITCHER */
#theme-bar{display:flex;gap:5px;padding:7px 14px;background:var(--bg1);border-bottom:.5px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:relative;z-index:5}
#theme-bar::-webkit-scrollbar{display:none}
.theme-btn{font-size:10px;font-family:var(--ff);font-weight:700;padding:8px 13px;border-radius:20px;border:1.5px solid var(--border-hi);background:var(--bg2);color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s;letter-spacing:.03em;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.theme-btn:hover{color:var(--text)}
.theme-btn.active{color:var(--bg0);border-color:transparent}

/* TABS */
#tabs{display:flex;background:var(--bg1);border-bottom:.5px solid var(--border);position:relative;z-index:5}
.tab{flex:1;padding:10px 0;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;border:none;background:transparent;cursor:pointer;color:var(--text3);font-family:var(--ff);border-bottom:2.5px solid transparent;transition:all .15s}
.tab.am{color:var(--accent);border-bottom-color:var(--accent)}
.tab.ad{color:var(--accent2);border-bottom-color:var(--accent2)}

#view-map{flex:1;overflow-y:auto;padding:12px 10px 8px;-webkit-overflow-scrolling:touch;background:var(--bg1)}
#view-done{display:none;flex-direction:column;padding:12px 10px;gap:8px;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg1)}
#statusbar{font-size:10px;color:var(--text3);padding:5px 14px 8px;background:var(--bg1);border-top:.5px solid var(--border);min-height:28px;letter-spacing:.03em}

/* NODES */
.node-row{display:flex;align-items:center;margin-bottom:3px;position:relative}
.node-connector{height:2px;width:14px;flex-shrink:0;margin-right:5px;border-radius:1px}
.node-card{flex:1;border-radius:12px;border:1.5px solid transparent;padding:9px 11px;cursor:pointer;display:flex;align-items:center;gap:7px;min-width:0;user-select:none;transition:filter .1s,border-color .15s,box-shadow .15s,opacity .15s;position:relative}
.node-card.selected{box-shadow:0 0 0 2px var(--sel-c,#fff),0 0 14px var(--sel-g,rgba(255,255,255,.2))}

.collapse-btn{width:19px;height:19px;border-radius:50%;background:transparent;cursor:pointer;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;font-family:var(--ff);border:2px solid;transition:transform .15s;padding:0;min-width:19px}
.collapse-btn:active{transform:scale(.82)}
.node-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* NODE SHAPES */
.node-card.shape-pill{border-radius:999px!important;padding-left:16px!important;padding-right:16px!important}
.node-card.shape-sharp{border-radius:3px!important}
.node-card.shape-cloud{border-radius:50px 50px 38px 38px / 28px 28px 38px 38px!important}
.node-card.shape-ticket{border-radius:4px!important;border-style:dashed!important}
.shape-btn{width:40px;height:30px;border-radius:8px;border:1.5px solid var(--border-hi);background:var(--bg2);cursor:pointer;font-size:10px;font-weight:700;font-family:var(--ff);display:flex;align-items:center;justify-content:center;transition:transform .12s,border-color .12s;flex-shrink:0;color:var(--text2);letter-spacing:.02em}
.shape-btn:hover,.shape-btn:active{transform:scale(1.12)}
.shape-btn.on{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent)}
#shape-row{display:flex;gap:6px;flex-wrap:wrap}
.node-sticker{font-size:15px;flex-shrink:0;line-height:1}
.node-label{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node-snip{font-size:10px;opacity:.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;flex-shrink:0}

.node-edit-btn{font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;border:none;cursor:pointer;font-family:var(--ff);flex-shrink:0;opacity:0;transition:opacity .15s;letter-spacing:.03em}
.node-card:hover .node-edit-btn,.node-card.selected .node-edit-btn{opacity:1}
@media(max-width:500px){.node-edit-btn{opacity:1}}
.branch-gap{height:12px}

/* ── INLINE DRAWER ── */
/* Lives in normal page flow — no fixed/absolute, no keyboard fights */
#drawer{
  margin:0 2px 10px;
  border-radius:14px;
  border:1.5px solid var(--border-hi);
  background:var(--bg2);
  overflow:hidden;
  display:none;
  position:relative;
  z-index:2;
}
#drawer.open{display:block}
#drawer-colorbar{height:3px;width:100%}
#drawer-top{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px 8px;
  border-bottom:.5px solid var(--border);
}
#drawer-breadcrumb{
  flex:1;font-size:10px;font-weight:600;color:var(--text3);
  letter-spacing:.06em;text-transform:uppercase;
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;
}
#drawer-close{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:#16a34a;border:none;cursor:pointer;
  font-size:16px;font-weight:800;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--ff);box-shadow:0 0 8px rgba(22,163,74,.4);
  transition:transform .12s;
  /* larger invisible tap area on mobile */
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
#drawer-close:hover{transform:scale(1.1)}
#drawer-name-row{
  padding:10px 12px 8px;
  border-bottom:.5px solid var(--border);
}
#drawer-name{
  font-size:16px;font-weight:700;font-family:var(--ff);
  border:none;background:transparent;color:var(--text);
  width:100%;outline:none;-webkit-appearance:none;
}
#drawer-name::placeholder{color:var(--text3)}
#drawer-body{
  padding:12px;
  display:flex;flex-direction:column;gap:11px;
  max-height:55vh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.d-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
#drawer-swatch-row{display:flex;gap:5px;flex-wrap:wrap}
#drawer-shape-row{display:flex;gap:5px;flex-wrap:wrap}
.drawer-star{font-size:22px;cursor:pointer;background:none;border:none;line-height:1;transition:transform .15s,filter .15s;filter:grayscale(1) opacity(.35)}
.drawer-star.on{filter:none;transform:scale(1.15)}
#drawer-desc{
  min-height:56px;font-size:16px;font-family:var(--ff);
  line-height:1.6;color:var(--text);
  padding:9px 11px;border-radius:10px;
  border:1px solid var(--border-hi);background:var(--bg3);
  outline:none;word-break:break-word;-webkit-user-modify:read-write;
}
#drawer-desc:focus{border-color:var(--accent)}
#drawer-desc:empty::before{content:attr(data-ph);color:var(--text3);pointer-events:none}
#drawer-desc ul,#drawer-desc ol{padding-left:18px}
.d-fmt-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.d-fmt-b{font-size:10px;font-weight:600;padding:4px 8px;border-radius:7px;border:1px solid var(--border-hi);background:var(--bg3);color:var(--text2);cursor:pointer;font-family:var(--ff)}
.d-fmt-b:hover{border-color:var(--accent);color:var(--accent)}
.d-input{
  font-size:16px;font-family:var(--ff);padding:8px 10px;border-radius:9px;
  border:1px solid var(--border-hi);background:var(--bg3);color:var(--text);
  width:100%;outline:none;-webkit-appearance:none;
}
.d-input:focus{border-color:var(--accent2)}
.d-input::placeholder{color:var(--text3)}
#drawer-link-row{display:flex;gap:6px}
#drawer-link{flex:1;font-size:16px;font-family:var(--ff);padding:8px 10px;border-radius:9px;border:1px solid var(--border-hi);background:var(--bg3);color:var(--text);outline:none;-webkit-appearance:none}
#drawer-link:focus{border-color:var(--accent2)}
#drawer-link::placeholder{color:var(--text3)}
#drawer-link-open{font-size:11px;font-weight:700;font-family:var(--ff);padding:8px 11px;border-radius:9px;background:var(--accent2);color:#000;border:none;cursor:pointer;white-space:nowrap;flex-shrink:0}
#drawer-img-prev{width:100%;border-radius:9px;object-fit:cover;max-height:80px;display:none;margin-top:5px;border:1px solid var(--border-hi)}
.d-btn{width:100%;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-family:var(--ff);padding:10px;border-radius:10px;cursor:pointer;border:none}
.d-btn:active{opacity:.8}
.d-done{background:transparent;color:var(--accent2);border:1.5px solid var(--accent2)}
.d-del {background:transparent;color:#f87171;border:1.5px solid rgba(248,113,113,.3)}

/* DONE */
.done-card{background:var(--bg2);border-radius:13px;border:1px solid color-mix(in srgb,var(--accent2) 25%,transparent);padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.done-lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent2);margin-bottom:3px}
.done-meta{font-size:10px;color:var(--text3);margin-top:3px}
.done-acts{display:flex;gap:5px;flex-shrink:0;flex-direction:column}
.done-act-btn{font-size:10px;font-weight:700;padding:5px 10px;border-radius:9px;border:1px solid var(--border-hi);cursor:pointer;font-family:var(--ff);background:var(--bg3);color:var(--text2);white-space:nowrap}
.done-act-btn.del{border-color:rgba(255,107,107,.3);color:#ff6b6b}
#done-empty{font-size:13px;color:var(--text3);text-align:center;margin-top:60px;line-height:2}
#done-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
#done-hdr-label{font-size:12px;font-weight:700;color:var(--accent2);letter-spacing:.07em;text-transform:uppercase}
#clear-done-btn{font-size:10px;font-weight:700;padding:5px 11px;border-radius:10px;border:1px solid rgba(255,107,107,.3);background:transparent;color:#ff6b6b;cursor:pointer;font-family:var(--ff)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

<body class="t-litebrite">

<canvas id="confetti-canvas"></canvas>

<div id="done-toast">
  <span id="done-toast-emoji">✨</span>
  <div id="done-toast-text">DONE!</div>
  <div id="done-toast-sub"></div>
</div>

<div id="shell">
  <div id="header">
    <canvas id="bg-canvas"></canvas>
    <div id="header-title" id="htitle">✨ Mind Map</div>
  </div>

  <div id="theme-bar">
    <button class="theme-btn active" data-theme="t-litebrite"  style="background:#ff00ff;color:#000">🌈 Lite Brite</button>
    <button class="theme-btn"        data-theme="t-goldenhour" style="color:var(--text2)">🌅 Golden Hour</button>
    <button class="theme-btn"        data-theme="t-deepocean"  style="color:var(--text2)">🌊 Deep Ocean</button>
    <button class="theme-btn"        data-theme="t-forest"     style="color:var(--text2)">🍄 Forest</button>
    <button class="theme-btn"        data-theme="t-princess"   style="color:var(--text2)">👑 Princess</button>
  </div>

  <div id="tabs">
    <button class="tab am" id="tab-map">✨ Mind map</button>
    <button class="tab"    id="tab-done">✅ Done (<span id="done-ct">0</span>)</button>
  </div>

  <div id="view-map">
    <canvas id="map-canvas"></canvas>
    <div id="drawer">
      <div id="drawer-colorbar"></div>
      <div id="drawer-top">
        <div id="drawer-breadcrumb"></div>
        <button id="drawer-close">✓</button>
      </div>
      <div id="drawer-name-row">
        <input id="drawer-name" placeholder="Name this node…"/>
      </div>
      <div id="drawer-body">
        <div><div class="d-lbl">🎨 Color</div><div id="drawer-swatch-row"></div></div>
        <div><div class="d-lbl">🔷 Shape</div><div id="drawer-shape-row"></div></div>
        <div style="display:flex;align-items:center;gap:10px">
          <button class="drawer-star" id="drawer-star-btn">⭐</button>
          <span style="font-size:12px;color:var(--text2)">Star this node</span>
        </div>
        <div>
          <div class="d-fmt-row">
            <button class="d-fmt-b" id="d-fmt-b"><b>B</b></button>
            <button class="d-fmt-b" id="d-fmt-i"><i>I</i></button>
            <button class="d-fmt-b" id="d-fmt-ul">• List</button>
            <button class="d-fmt-b" id="d-fmt-ol">1. List</button>
            <button class="d-fmt-b" id="d-fmt-clr">Clear</button>
          </div>
          <div id="drawer-desc" contenteditable="true" data-ph="Notes, ideas…"></div>
        </div>
        <div id="drawer-link-row">
          <input id="drawer-link" placeholder="https://…"/>
          <button id="drawer-link-open">Open</button>
        </div>
        <div>
          <input class="d-input" id="drawer-img" placeholder="Image URL…"/>
          <img id="drawer-img-prev" alt=""/>
        </div>
        <button class="d-btn d-done" id="drawer-done-btn">✅ Mark as done</button>
        <button class="d-btn d-del"  id="drawer-del-btn">🗑️ Delete</button>
      </div>
    </div>
  </div>

  <div id="view-done">
    <div id="done-hdr">
      <span id="done-hdr-label">✅ Completed</span>
      <button id="clear-done-btn">Clear all</button>
    </div>
    <div id="done-list"></div>
    <div id="done-empty">Nothing done yet ✨<br><span style="font-size:11px;opacity:.5">Mark nodes as done to archive them here</span></div>
  </div>

  <!-- Floating bottom add bar -->
  <div id="fab-bar">
    <div id="fab-input-row">
      <input id="add-input" placeholder="New thought… 💭" maxlength="40" autocomplete="off"/>
      <button class="btn btn-add" id="btn-child">+ Child</button>
    </div>
    <div id="fab-btn-row">
      <button class="btn btn-blank" id="btn-blank">✦ Blank</button>
      <button class="btn btn-root"  id="btn-root">🌿 Branch</button>
      <div style="flex:1"></div>
      <button class="btn btn-icon btn-subtle" id="btn-export" title="Backup to file">💾</button>
      <input  type="file" id="import-file" accept=".json" style="display:none"/>
      <button class="btn btn-icon btn-subtle" id="btn-import" title="Load from file">📂</button>
    </div>
  </div>
  <div id="statusbar">Tap to select · Double-tap to edit ✨</div>
</div>

    {bg:'rgba(180,40,255,.12)',  border:'#b428ff', text:'#d898ff', glow:'rgba(180,40,255,.45)'},
    {bg:'rgba(255,100,200,.12)', border:'#ff64c8', text:'#ffbce8', glow:'rgba(255,100,200,.4)'},
    {bg:'rgba(255,180,240,.1)',  border:'#ffb4f0', text:'#ffdaf8', glow:'rgba(255,180,240,.35)'},
    {bg:'rgba(240,60,220,.12)',  border:'#f03cdc', text:'#f8aaee', glow:'rgba(240,60,220,.45)'},
    {bg:'rgba(255,120,180,.12)', border:'#ff78b4', text:'#ffc4da', glow:'rgba(255,120,180,.4)'},
    {bg:'rgba(200,80,255,.12)',  border:'#c850ff', text:'#e4b0ff', glow:'rgba(200,80,255,.4)'},
    {bg:'rgba(255,60,200,.12)',  border:'#ff3cc8', text:'#ffaaeb', glow:'rgba(255,60,200,.45)'},
    {bg:'rgba(255,200,240,.1)',  border:'#ffc8f0', text:'#ffe4f8', glow:'rgba(255,200,240,.35)'},
  ],
};

const THEME_META = {
  't-litebrite':  { title:'🌈 Lite Brite', done1:'🌈', done2:'RAINBOW! ✨', confetti:['#ff2020','#ff6400','#ffc800','#50ff00','#00c8ff','#8c00ff','#ff00ff','#ff0078','#fff000','#00ffc8'] },
  't-goldenhour': { title:'🌅 Golden Hour', done1:'🌅', done2:'GOLDEN! ✨', confetti:['#ffc800','#ff6400','#ffaa00','#ff3c00','#ffdc50','#ff8c00','#fff064','#ffb414','#dc3c00','#c86400'] },
  't-deepocean':  { title:'🌊 Deep Ocean', done1:'🌊', done2:'DEEP! ✨', confetti:['#00b4ff','#64dcc8','#0064ff','#00dcdc','#50a0ff','#00a0c8','#00f0c8','#00c8ff','#3cc8b4','#64b4ff'] },
  't-forest':     { title:'🍄 Enchanted Forest', done1:'🍄', done2:'MAGIC! ✨', confetti:['#78ff50','#ffc832','#50dc64','#c8ff00','#3cc850','#ffb400','#64ff78','#dcff50','#28b43c','#ffdc00'] },
  't-princess':   { title:'👑 Princess Mode', done1:'💖', done2:'SLAY! 👑', confetti:['#ff50b4','#dc3cff','#ff8cdc','#ff3c8c','#b428ff','#ff64c8','#ffb4f0','#f03cdc','#ff78b4','#c850ff'] },
};


const THEME_KEY   = 'mindmap_theme_v1';

let nodes=[], doneItems=[], idC=0;
let selectedId=null, editingId=null;
let currentTheme = localStorage.getItem(THEME_KEY) || 't-litebrite';

// ── Apply theme ──
function applyTheme(t) {
  currentTheme = t;
  document.body.className = t;
  localStorage.setItem(THEME_KEY, t);
  const meta = THEME_META[t];
  document.getElementById('header-title').textContent = meta.title;
  document.querySelectorAll('.theme-btn').forEach(b => {
    const active = b.dataset.theme === t;
    b.classList.toggle('active', active);
    if (active) {
      const pal = THEME_PALETTES[t];
      b.style.background = pal[0].border;
      b.style.color = '#000';
    } else {
      b.style.background = '';
      b.style.color = '';
    }
  });
  rebuildSwatches();
  if (window._rebuildDrawerSwatches) window._rebuildDrawerSwatches();
  startBgAnimation(t);
  startMapAnimation(t);
}

// ── BACKGROUND CANVAS ANIMATION ──
let bgRaf = null;
function startBgAnimation(theme) {
  if (bgRaf) { cancelAnimationFrame(bgRaf); bgRaf = null; }
  const canvas = document.getElementById('bg-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  sizeBgCanvas();
  const cw = () => canvas.width;
  const ch = () => canvas.height;

  if (theme === 't-litebrite') {
    // Rainbow neon pegs on a grid, pulsing in sequence
    const COLS = ['#ff2020','#ff6400','#ffc800','#50ff00','#00c8ff','#8c00ff','#ff00ff','#ff0078','#00ffc8','#fff000'];
    const cols = 18, rows = 5;
    const pegs = [];
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
      pegs.push({ col:c, row:r, color:COLS[Math.floor(Math.random()*COLS.length)], phase:Math.random()*Math.PI*2, speed:0.012+Math.random()*0.018 });
    }
    function draw() {
      ctx.clearRect(0,0,cw(),ch());
      const cxGap = cw()/(cols+1), cyGap = ch()/(rows+1);
      pegs.forEach(p => {
        p.phase += p.speed;
        const glow = (Math.sin(p.phase)+1)/2;
        const x = cxGap*(p.col+1), y = cyGap*(p.row+1);
        const r = 2.5 + glow*2.5;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
        ctx.fillStyle = p.color; ctx.globalAlpha = 0.18+glow*0.5;
        ctx.shadowColor = p.color; ctx.shadowBlur = 6+glow*14;
        ctx.fill(); ctx.shadowBlur=0; ctx.globalAlpha=1;
      });
      bgRaf = requestAnimationFrame(draw);
    }
    draw();

  } else if (theme === 't-goldenhour') {
    // Sun rising from the horizon with rays, lens flare, drifting heat haze
    const sunY = ch()*0.72;
    const sunR = Math.min(cw(),ch())*0.2;
    const rays = Array.from({length:14},(_,i)=>({ angle:(i/14)*Math.PI*2, len:sunR*1.6+Math.random()*sunR, width:1+Math.random()*2.5, phase:Math.random()*Math.PI*2 }));
    const haze = Array.from({length:6},(_,i)=>({ y:sunY-ch()*0.1+i*ch()*0.04, phase:Math.random()*Math.PI*2, speed:0.004+Math.random()*0.003 }));
    let t=0;
    function draw() {
      t+=0.008; ctx.clearRect(0,0,cw(),ch());
      // Sky gradient
      const sky=ctx.createLinearGradient(0,0,0,ch());
      sky.addColorStop(0,'rgba(10,4,0,1)'); sky.addColorStop(0.6,'rgba(40,8,0,0.8)'); sky.addColorStop(1,'rgba(80,20,0,0.9)');
      ctx.fillStyle=sky; ctx.fillRect(0,0,cw(),ch());
      // Sun glow halo
      const halo=ctx.createRadialGradient(cw()/2,sunY,sunR*0.4,cw()/2,sunY,sunR*3.5);
      halo.addColorStop(0,'rgba(255,200,50,0.22)'); halo.addColorStop(0.4,'rgba(255,100,0,0.1)'); halo.addColorStop(1,'transparent');
      ctx.fillStyle=halo; ctx.fillRect(0,0,cw(),ch());
      // Rays
      rays.forEach(ray=>{
        ray.phase+=0.006;
        const pulse=(Math.sin(ray.phase)+1)/2;
        ctx.save(); ctx.translate(cw()/2,sunY); ctx.rotate(ray.angle+t*0.04);
        const rg=ctx.createLinearGradient(0,0,ray.len+pulse*20,0);
        rg.addColorStop(0,`rgba(255,200,60,${0.25+pulse*0.2})`); rg.addColorStop(1,'transparent');
        ctx.beginPath(); ctx.moveTo(sunR*0.85,0); ctx.lineTo(ray.len+pulse*20,0);
        ctx.strokeStyle=rg; ctx.lineWidth=ray.width; ctx.stroke(); ctx.restore();
      });
      // Sun disc
      const disc=ctx.createRadialGradient(cw()/2,sunY,0,cw()/2,sunY,sunR);
      disc.addColorStop(0,'rgba(255,240,180,0.95)'); disc.addColorStop(0.6,'rgba(255,160,0,0.85)'); disc.addColorStop(1,'rgba(255,80,0,0.5)');
      ctx.beginPath(); ctx.arc(cw()/2,sunY,sunR,0,Math.PI*2); ctx.fillStyle=disc; ctx.fill();
      // Heat haze lines
      haze.forEach(h=>{ h.phase+=h.speed; const y=h.y+Math.sin(h.phase)*4;
        const hg=ctx.createLinearGradient(0,y,cw(),y);
        hg.addColorStop(0,'transparent'); hg.addColorStop(0.3,'rgba(255,140,0,0.06)'); hg.addColorStop(0.7,'rgba(255,180,0,0.06)'); hg.addColorStop(1,'transparent');
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cw(),y); ctx.strokeStyle=hg; ctx.lineWidth=1; ctx.stroke();
      });
      bgRaf = requestAnimationFrame(draw);
    }
    draw();

  } else if (theme === 't-deepocean') {
    // Underwater scene: surface caustics, fish silhouettes, kelp, depth gradient
    const caustics = Array.from({length:8},()=>({ x:Math.random()*cw(), y:Math.random()*ch()*0.6, r:20+Math.random()*50, phase:Math.random()*Math.PI*2, speed:0.018+Math.random()*0.012 }));
    const fish = Array.from({length:5},()=>({ x:Math.random()*cw(), y:ch()*0.2+Math.random()*ch()*0.5, speed:0.3+Math.random()*0.5, size:8+Math.random()*14, dir:Math.random()>0.5?1:-1, phase:Math.random()*Math.PI*2 }));
    const kelp = Array.from({length:8},(_,i)=>({ x:(cw()/(8))*i+Math.random()*30, segs:5+Math.floor(Math.random()*4), phase:Math.random()*Math.PI*2, speed:0.008+Math.random()*0.006 }));
    let t=0;
    function draw() {
      t+=0.6; ctx.clearRect(0,0,cw(),ch());
      // Depth gradient
      const dg=ctx.createLinearGradient(0,0,0,ch());
      dg.addColorStop(0,'rgba(0,20,60,0.95)'); dg.addColorStop(1,'rgba(0,5,20,0.98)');
      ctx.fillStyle=dg; ctx.fillRect(0,0,cw(),ch());
      // Surface shimmer
      const sg=ctx.createLinearGradient(0,0,0,ch()*0.15);
      sg.addColorStop(0,'rgba(0,150,255,0.12)'); sg.addColorStop(1,'transparent');
      ctx.fillStyle=sg; ctx.fillRect(0,0,cw(),ch()*0.15);
      // Caustic rings
      caustics.forEach(c=>{ c.phase+=c.speed; const fade=(Math.sin(c.phase)+1)/2;
        ctx.beginPath(); ctx.arc(c.x,c.y,c.r+fade*20,0,Math.PI*2);
        ctx.strokeStyle=`rgba(100,220,255,${fade*0.12})`; ctx.lineWidth=1.5; ctx.stroke();
        ctx.beginPath(); ctx.arc(c.x,c.y,c.r*0.5+fade*10,0,Math.PI*2);
        ctx.strokeStyle=`rgba(100,220,255,${fade*0.08})`; ctx.lineWidth=0.8; ctx.stroke();
      });
      // Kelp
      kelp.forEach(k=>{ k.phase+=k.speed;
        const segH=ch()/(k.segs+1);
        ctx.beginPath(); ctx.moveTo(k.x,ch());
        for(let s=k.segs;s>=0;s--){ const sy=ch()-s*segH; const sway=Math.sin(k.phase+s*0.5)*(s*4); ctx.lineTo(k.x+sway,sy); }
        ctx.strokeStyle='rgba(0,120,60,0.3)'; ctx.lineWidth=2; ctx.stroke();
      });
      // Fish
      fish.forEach(f=>{ f.x+=f.speed*f.dir; f.phase+=0.08;
        if(f.x>cw()+30)f.x=-30; if(f.x<-30)f.x=cw()+30;
        const tailY=Math.sin(f.phase)*3;
        ctx.save(); ctx.translate(f.x,f.y+tailY); ctx.scale(f.dir,1);
        ctx.fillStyle='rgba(100,200,255,0.15)'; ctx.beginPath();
        ctx.ellipse(0,0,f.size,f.size*0.45,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-f.size,0); ctx.lineTo(-f.size-f.size*0.5,-f.size*0.3); ctx.lineTo(-f.size-f.size*0.5,f.size*0.3); ctx.closePath();
        ctx.fillStyle='rgba(80,180,255,0.1)'; ctx.fill(); ctx.restore();
      });
      bgRaf = requestAnimationFrame(draw);
    }
    draw();

  } else if (theme === 't-forest') {
    // Forest canopy: tree silhouettes, fireflies orbiting, moon/stars, mist
    const trees = Array.from({length:10},(_,i)=>({ x:(cw()/10)*i+Math.random()*30, h:ch()*0.35+Math.random()*ch()*0.25, w:18+Math.random()*22 }));
    const flies = Array.from({length:28},()=>({ x:Math.random()*cw(), y:ch()*0.15+Math.random()*ch()*0.7, cx:Math.random()*cw(), cy:ch()*0.2+Math.random()*ch()*0.5, r:20+Math.random()*60, angle:Math.random()*Math.PI*2, speed:0.006+Math.random()*0.01, phase:Math.random()*Math.PI*2, color:Math.random()>0.4?'#78ff50':'#ffc832' }));
    const mist = Array.from({length:5},(_,i)=>({ y:ch()*(0.5+i*0.1), phase:Math.random()*Math.PI*2, speed:0.003+Math.random()*0.003 }));
    function draw() {
      ctx.clearRect(0,0,cw(),ch());
      // Night sky gradient
      const sky=ctx.createLinearGradient(0,0,0,ch());
      sky.addColorStop(0,'rgba(2,8,2,0.97)'); sky.addColorStop(0.7,'rgba(5,15,3,0.9)'); sky.addColorStop(1,'rgba(10,25,5,0.95)');
      ctx.fillStyle=sky; ctx.fillRect(0,0,cw(),ch());
      // Stars
      for(let i=0;i<25;i++){ctx.beginPath();ctx.arc((i*73+31)%cw(),(i*47+11)%ch()*0.5,0.8,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,200,${0.2+((i*17)%10)*0.05})`;ctx.fill();}
      // Moon
      const moonX=cw()*0.8, moonY=ch()*0.18;
      const moon=ctx.createRadialGradient(moonX,moonY,0,moonX,moonY,ch()*0.12);
      moon.addColorStop(0,'rgba(255,220,100,0.18)'); moon.addColorStop(0.4,'rgba(200,255,120,0.08)'); moon.addColorStop(1,'transparent');
      ctx.fillStyle=moon; ctx.fillRect(0,0,cw(),ch());
      ctx.beginPath(); ctx.arc(moonX,moonY,ch()*0.065,0,Math.PI*2);
      ctx.fillStyle='rgba(220,255,180,0.2)'; ctx.fill();
      // Mist bands
      mist.forEach(m=>{ m.phase+=m.speed;
        const y=m.y+Math.sin(m.phase)*8;
        const mg=ctx.createLinearGradient(0,y-15,0,y+15);
        mg.addColorStop(0,'transparent'); mg.addColorStop(0.5,'rgba(40,100,20,0.07)'); mg.addColorStop(1,'transparent');
        ctx.fillStyle=mg; ctx.fillRect(0,y-15,cw(),30);
      });
      // Tree silhouettes
      trees.forEach(tr=>{
        ctx.fillStyle='rgba(5,20,3,0.92)';
        ctx.beginPath(); ctx.moveTo(tr.x,ch());
        ctx.lineTo(tr.x-tr.w/2,ch()-tr.h*0.4);
        ctx.lineTo(tr.x-tr.w*0.35,ch()-tr.h*0.4);
        ctx.lineTo(tr.x-tr.w*0.5,ch()-tr.h*0.65);
        ctx.lineTo(tr.x-tr.w*0.32,ch()-tr.h*0.65);
        ctx.lineTo(tr.x,ch()-tr.h);
        ctx.lineTo(tr.x+tr.w*0.32,ch()-tr.h*0.65);
        ctx.lineTo(tr.x+tr.w*0.5,ch()-tr.h*0.65);
        ctx.lineTo(tr.x+tr.w*0.35,ch()-tr.h*0.4);
        ctx.lineTo(tr.x+tr.w/2,ch()-tr.h*0.4);
        ctx.closePath(); ctx.fill();
      });
      // Fireflies
      flies.forEach(f=>{ f.angle+=f.speed; f.phase+=0.025;
        const glow=(Math.sin(f.phase)+1)/2;
        const x=f.cx+Math.cos(f.angle)*f.r; const y=f.cy+Math.sin(f.angle)*f.r*0.4;
        ctx.beginPath(); ctx.arc(x,y,1.2+glow*1.8,0,Math.PI*2);
        ctx.fillStyle=f.color; ctx.globalAlpha=0.1+glow*0.6;
        ctx.shadowColor=f.color; ctx.shadowBlur=6+glow*14;
        ctx.fill(); ctx.shadowBlur=0; ctx.globalAlpha=1;
      });
      bgRaf = requestAnimationFrame(draw);
    }
    draw();
  } else if (theme === 't-princess') {
    // Clean: twinkling 4-point stars + floating gems/diamonds + soft pink nebula glow
    let t = 0;
    const stars = Array.from({length:28},(_,i)=>({
      x: (i*137+19) % cw(), y: (i*83+7) % (ch()*.85),
      phase: Math.random()*Math.PI*2, speed: .02+Math.random()*.025,
      size: .8+Math.random()*1.8
    }));
    const gems = Array.from({length:16},()=>({
      x: Math.random()*cw(), y: Math.random()*ch(),
      vy: -(0.12+Math.random()*.18), vx: (Math.random()-.5)*.15,
      phase: Math.random()*Math.PI*2, speed: .025+Math.random()*.02,
      size: 3+Math.random()*4,
      color: ['#ff60c8','#cc40ff','#ff90e0','#e060ff','#ffaaee'][Math.floor(Math.random()*5)],
      rot: Math.random()*Math.PI
    }));

    function drawDiamond(x, y, s, rot, col, alpha) {
      ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.globalAlpha=alpha;
      ctx.fillStyle=col;
      ctx.beginPath();
      ctx.moveTo(0,-s); ctx.lineTo(s*.6,0); ctx.lineTo(0,s); ctx.lineTo(-s*.6,0);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.35)';
      ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(s*.6,0); ctx.lineTo(0,-s*.1); ctx.closePath(); ctx.fill();
      ctx.restore(); ctx.globalAlpha=1;
    }

    function draw4Star(x, y, r, col, alpha) {
      ctx.save(); ctx.globalAlpha=alpha;
      for(let i=0;i<4;i++){
        ctx.save(); ctx.translate(x,y); ctx.rotate(i*Math.PI/2);
        ctx.fillStyle=col;
        ctx.beginPath();
        ctx.moveTo(0,-r);
        ctx.quadraticCurveTo(r*.22,0,0,0);
        ctx.quadraticCurveTo(-r*.22,0,0,-r);
        ctx.fill(); ctx.restore();
      }
      ctx.restore(); ctx.globalAlpha=1;
    }

    function draw() {
      t+=.01; ctx.clearRect(0,0,cw(),ch());

      // Gradient sky — deep purple to midnight
      const sky = ctx.createLinearGradient(0,0,0,ch());
      sky.addColorStop(0,'rgba(8,0,16,1)');
      sky.addColorStop(.5,'rgba(18,0,28,1)');
      sky.addColorStop(1,'rgba(12,0,14,1)');
      ctx.fillStyle=sky; ctx.fillRect(0,0,cw(),ch());

      // Soft nebula glows — 3 radial blobs
      [
        [cw()*.2, ch()*.3, 'rgba(200,40,255,.07)', cw()*.4],
        [cw()*.8, ch()*.5, 'rgba(255,60,200,.08)', cw()*.35],
        [cw()*.5, ch()*.8, 'rgba(180,20,240,.06)', cw()*.5],
      ].forEach(([nx,ny,nc,nr])=>{
        const g=ctx.createRadialGradient(nx,ny,0,nx,ny,nr);
        g.addColorStop(0,nc); g.addColorStop(1,'transparent');
        ctx.fillStyle=g; ctx.fillRect(0,0,cw(),ch());
      });

      // 4-point sparkle stars
      stars.forEach(s=>{
        s.phase+=s.speed;
        const glow=(Math.sin(s.phase)+1)/2;
        draw4Star(s.x, s.y, s.size*(1+glow*.8), `rgba(255,200,240,${.15+glow*.6})`, 1);
      });

      // Floating gem diamonds
      gems.forEach(d=>{
        d.y+=d.vy; d.x+=d.vx; d.phase+=d.speed; d.rot+=.008;
        const glow=(Math.sin(d.phase)+1)/2;
        if(d.y<-20){d.y=ch()+10; d.x=Math.random()*cw();}
        ctx.save();
        ctx.shadowColor=d.color; ctx.shadowBlur=8+glow*10;
        drawDiamond(d.x, d.y, d.size*(0.7+glow*.4), d.rot, d.color, .4+glow*.45);
        ctx.shadowBlur=0; ctx.restore();
      });

      bgRaf = requestAnimationFrame(draw);
    }
    draw();
  }
}

// ── Helpers ──
function mk(label, parentId, ci) {
  return { id:idC++, label, parentId:parentId??null, colorIdx:ci??0, descHtml:'', link:'', imgUrl:'', starred:false, shape:'default', collapsed:false, order:Date.now() };
}
function getChildren(id) {
  return nodes.filter(n => n.parentId === id).sort((a,b) => {
    if (a.starred && !b.starred) return -1;
    if (!a.starred && b.starred) return 1;
    return a.order - b.order;
  });
}
function getRoots() {
  return nodes.filter(n => n.parentId === null).sort((a,b) => {
    if (a.starred && !b.starred) return -1;
    if (!a.starred && b.starred) return 1;
    return a.order - b.order;
  });
}
function getDescendants(id) { const ids=[id]; getChildren(id).forEach(c=>ids.push(...getDescendants(c.id))); return ids }
function getColor(n)        { const pal=THEME_PALETTES[currentTheme]; return pal[n.colorIdx % pal.length] }
function childCI(parentId)  {
  const p = nodes.find(n => n.id === parentId);
  if (!p) return getRoots().length % THEME_PALETTES[currentTheme].length;
  return p.colorIdx; // always inherit parent color
}
function setStatus(m) { document.getElementById('statusbar').textContent = m }
function updateDoneCt() { document.getElementById('done-ct').textContent = doneItems.length }

// ── Storage ──
const STORAGE_KEY = 'mindmap_4themes_v3'; // bumped — forces fresh seed, clears orphaned data
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({nodes,doneItems,idC})) } catch(e) {} }
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return false;
    const d = JSON.parse(raw); nodes=d.nodes||[]; doneItems=d.doneItems||[]; idC=d.idC||0;
    // Heal any orphaned nodes (parentId points to a node that no longer exists)
    const validIds = new Set(nodes.map(n => n.id));
    nodes.forEach(n => {
      if (n.parentId !== null && !validIds.has(n.parentId)) n.parentId = null;
      if (n.order == null) n.order = n.id;
      if (!n.shape) n.shape = 'default';
      if (n.starred == null) n.starred = n.stickerIdx === 0; // migrate old star sticker
      delete n.stickerIdx;
    });
    return nodes.length > 0;
  } catch(e) { return false }
}

      nodes.forEach(n => { if (n.order==null) n.order=n.id; if (!n.shape) n.shape='default'; });
      save(); render(); renderDone(); updateDoneCt(); setStatus('Loaded ✨');
    } catch(err) { setStatus('Error loading file') }
  };
  r.readAsText(file); e.target.value = '';
});

// ── Add nodes ──
function getDefaultParent() {
  if (selectedId !== null) return selectedId;
  const r = getRoots(); return r.length ? r[r.length-1].id : null;
}
function addChild() {
  const val = document.getElementById('add-input').value.trim();
  if (!val) { document.getElementById('add-input').focus(); return }

  const parentId = getDefaultParent();
  const sib = getChildren(parentId);
  const n = mk(val, parentId, childCI(parentId));
  n.order = sib.length ? Math.max(...sib.map(s=>s.order)) + 1 : 0;
  nodes.push(n); selectedId = n.id;
  save(); render(); document.getElementById('add-input').value=''; document.getElementById('add-input').focus();
  setStatus(`"${val}" added ✨`);
}
function addBlank() {

  const parentId = getDefaultParent();
  const sib = getChildren(parentId);
  const n = mk('New node', parentId, childCI(parentId));
  n.order = sib.length ? Math.max(...sib.map(s=>s.order)) + 1 : 0;
  nodes.push(n); selectedId = n.id;
  save(); render(); openModal(n.id);
}
function addRoot() {
  const val = document.getElementById('add-input').value.trim() || 'New branch';

  const roots = getRoots();
  const n = mk(val, null, roots.length % THEME_PALETTES[currentTheme].length);
  n.order = roots.length ? Math.max(...roots.map(r=>r.order)) + 1 : 0;
  nodes.push(n); selectedId = n.id;
  save(); render(); document.getElementById('add-input').value=''; setStatus(`Branch "${val}" created 🌿`);
}
document.getElementById('btn-child').addEventListener('click', addChild);
document.getElementById('btn-blank').addEventListener('click', addBlank);
document.getElementById('btn-root').addEventListener('click',  addRoot);
document.getElementById('add-input').addEventListener('keydown', e => { if (e.key==='Enter') addChild() });

function deleteNode(id) {
  if (!confirm('Delete this node and all its children?')) return;

  const ids = new Set(getDescendants(id));
  nodes = nodes.filter(n => !ids.has(n.id));
  if (ids.has(selectedId)) selectedId = null;
  save(); render(); setStatus('Deleted 💨');
}
function toggleCollapse(id) {
  const n = nodes.find(x => x.id===id); if (!n) return;
  n.collapsed = !n.collapsed; save(); render();
}

// ── MAP CANVAS ANIMATION ──
let mapRaf = null;
function startMapAnimation(theme) {
  if (mapRaf) { cancelAnimationFrame(mapRaf); mapRaf = null; }
  const canvas = document.getElementById('map-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const view = document.getElementById('view-map');
  function resize() { canvas.width=view.clientWidth; canvas.height=view.clientHeight; }
  resize();
  const W = ()=>canvas.width, H = ()=>canvas.height;

  if (theme === 't-litebrite') {
    // Match banner: pulsing neon dots scattered across the map
    const COLS=['#ff2020','#ff6400','#ffc800','#50ff00','#00c8ff','#8c00ff','#ff00ff','#ff0078','#00ffc8','#fff000'];
    const dots = Array.from({length:40},()=>({
      x:Math.random()*W(), y:Math.random()*H(),
      color:COLS[Math.floor(Math.random()*COLS.length)],
      phase:Math.random()*Math.PI*2, speed:0.01+Math.random()*0.016, r:1.2+Math.random()*1.6
    }));
    function draw() {
      ctx.clearRect(0,0,W(),H());
      dots.forEach(d=>{
        d.phase+=d.speed;
        const g=(Math.sin(d.phase)+1)/2;
        ctx.beginPath(); ctx.arc(d.x,d.y,d.r+g*1.2,0,Math.PI*2);
        ctx.fillStyle=d.color; ctx.globalAlpha=0.1+g*0.22;
        ctx.shadowColor=d.color; ctx.shadowBlur=4+g*8;
        ctx.fill(); ctx.shadowBlur=0; ctx.globalAlpha=1;
      });
      mapRaf=requestAnimationFrame(draw);
    }
    draw();

  } else if (theme === 't-goldenhour') {
    // Match banner: sun rays radiating from bottom-center, drifting heat haze
    const rays = Array.from({length:10},(_,i)=>({
      angle:-Math.PI*0.8 + (i/9)*Math.PI*1.6,
      phase:Math.random()*Math.PI*2, speed:0.005+Math.random()*0.004,
      len:0.4+Math.random()*0.4, color:Math.random()>0.5?'#ff8c00':'#ffc800'
    }));
    function draw() {
      ctx.clearRect(0,0,W(),H());
      const ox=W()/2, oy=H()*1.1;
      rays.forEach(r=>{
        r.phase+=r.speed;
        const pulse=(Math.sin(r.phase)+1)/2;
        const len=(r.len+pulse*0.15)*H();
        const grd=ctx.createLinearGradient(ox,oy,ox+Math.cos(r.angle)*len,oy+Math.sin(r.angle)*len);
        grd.addColorStop(0,r.color+'18'); grd.addColorStop(1,r.color+'00');
        ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ox+Math.cos(r.angle)*len,oy+Math.sin(r.angle)*len);
        ctx.strokeStyle=grd; ctx.lineWidth=6+pulse*8; ctx.stroke();
      });
      mapRaf=requestAnimationFrame(draw);
    }
    draw();

  } else if (theme === 't-deepocean') {
    // Match banner: expanding caustic rings + rising bubbles
    const rings = Array.from({length:8},()=>({
      x:Math.random()*W(), y:Math.random()*H(),
      r:0, maxR:60+Math.random()*100, speed:0.25+Math.random()*0.3,
      color:Math.random()>0.5?'#00b4ff':'#64dcc8', opacity:0.05+Math.random()*0.06
    }));
    const bubbles = Array.from({length:14},()=>({
      x:Math.random()*W(), y:H()+Math.random()*H(),
      r:1+Math.random()*2.5, speed:0.2+Math.random()*0.3,
      color:['#00b4ff','#64dcc8','#00dcdc'][Math.floor(Math.random()*3)]
    }));
    function draw() {
      ctx.clearRect(0,0,W(),H());
      rings.forEach(rng=>{
        rng.r+=rng.speed;
        if(rng.r>rng.maxR){rng.r=0;rng.x=Math.random()*W();rng.y=Math.random()*H();}
        const fade=1-rng.r/rng.maxR;
        ctx.beginPath(); ctx.arc(rng.x,rng.y,rng.r,0,Math.PI*2);
        ctx.strokeStyle=rng.color+Math.round(fade*rng.opacity*255).toString(16).padStart(2,'0');
        ctx.lineWidth=1.5*fade; ctx.stroke();
      });
      bubbles.forEach(b=>{
        b.y-=b.speed; b.x+=Math.sin(b.y/40)*0.2;
        if(b.y<-10){b.y=H()+10;b.x=Math.random()*W();}
        ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.strokeStyle=b.color; ctx.globalAlpha=0.2; ctx.lineWidth=0.8; ctx.stroke(); ctx.globalAlpha=1;
      });
      mapRaf=requestAnimationFrame(draw);
    }
    draw();

  } else if (theme === 't-forest') {
    // Match banner: fireflies orbiting in lazy ellipses
    const flies = Array.from({length:20},()=>({
      cx:Math.random()*W(), cy:Math.random()*H(),
      r:15+Math.random()*50, angle:Math.random()*Math.PI*2,
      speed:0.006+Math.random()*0.009,
      phase:Math.random()*Math.PI*2, pSpeed:0.02+Math.random()*0.02,
      color:Math.random()>0.4?'#78ff50':'#ffc832'
    }));
    function draw() {
      ctx.clearRect(0,0,W(),H());
      flies.forEach(f=>{
        f.angle+=f.speed; f.phase+=f.pSpeed;
        const glow=(Math.sin(f.phase)+1)/2;
        const x=f.cx+Math.cos(f.angle)*f.r;
        const y=f.cy+Math.sin(f.angle)*f.r*0.5;
        ctx.beginPath(); ctx.arc(x,y,1+glow*1.5,0,Math.PI*2);
        ctx.fillStyle=f.color; ctx.globalAlpha=0.1+glow*0.45;
        ctx.shadowColor=f.color; ctx.shadowBlur=5+glow*10;
        ctx.fill(); ctx.shadowBlur=0; ctx.globalAlpha=1;
      });
      mapRaf=requestAnimationFrame(draw);
    }
    draw();

  } else if (theme === 't-princess') {
    // Match banner: floating gem diamonds + 4-point sparkle stars drifting up
    const gems = Array.from({length:16},()=>({
      x:Math.random()*W(), y:Math.random()*H(),
      vy:-(0.1+Math.random()*0.2), vx:(Math.random()-.5)*0.15,
      size:2.5+Math.random()*3.5, rot:Math.random()*Math.PI,
      phase:Math.random()*Math.PI*2, speed:0.02+Math.random()*0.02,
      color:['#ff60c8','#cc40ff','#ff90e0','#e060ff','#ffaaee'][Math.floor(Math.random()*5)]
    }));
    function drawDiamond(x,y,s,rot,col,alpha){
      ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.globalAlpha=alpha;
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(s*.6,0); ctx.lineTo(0,s); ctx.lineTo(-s*.6,0); ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.3)';
      ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(s*.6,0); ctx.lineTo(0,-s*.15); ctx.closePath(); ctx.fill();
      ctx.restore(); ctx.globalAlpha=1;
    }
    function draw(){
      ctx.clearRect(0,0,W(),H());
      gems.forEach(g=>{
        g.x+=g.vx; g.y+=g.vy; g.rot+=0.007; g.phase+=g.speed;
        const glow=(Math.sin(g.phase)+1)/2;
        if(g.y<-20){g.y=H()+10;g.x=Math.random()*W();}
        ctx.save(); ctx.shadowColor=g.color; ctx.shadowBlur=4+glow*8;
        drawDiamond(g.x,g.y,g.size*(0.6+glow*.4),g.rot,g.color,0.25+glow*0.35);
        ctx.shadowBlur=0; ctx.restore();
      });
      mapRaf=requestAnimationFrame(draw);
    }
    draw();
  }
}



// ── CONFETTI ──
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight; canvas.style.display='block';
  const cols = THEME_META[currentTheme].confetti;
  const pieces = Array.from({length:130}, () => ({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height - canvas.height,
    w:Math.random()*10+5, h:Math.random()*6+3,
    color:cols[Math.floor(Math.random()*cols.length)],
    rot:Math.random()*360, spin:Math.random()*6-3,
    vx:Math.random()*4-2, vy:Math.random()*4+3, life:1, decay:Math.random()*.008+.006
  }));
  let raf;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height); let alive=false;
    pieces.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.spin; p.life-=p.decay; p.vy+=.08;
      if (p.life>0) { alive=true; ctx.save(); ctx.globalAlpha=p.life; ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180); ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore() }
    });
    if (alive) raf=requestAnimationFrame(draw);
    else { ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display='none' }
  }
  raf=requestAnimationFrame(draw);
  setTimeout(() => { cancelAnimationFrame(raf); ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display='none' }, 3500);
}

// ── Archive ──
function archiveNode(id) {
  const now = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  function collect(nid) {
    const n = nodes.find(x=>x.id===nid); if (!n) return [];
    return [{label:n.label,descHtml:n.descHtml,link:n.link,archivedAt:now}, ...getChildren(nid).flatMap(c=>collect(c.id))];
  }
  const label = nodes.find(x=>x.id===id)?.label||'';
  doneItems.push(...collect(id));
  const ids = new Set(getDescendants(id));
  nodes = nodes.filter(n => !ids.has(n.id));
  if (ids.has(selectedId)) selectedId=null;
  launchConfetti(); showDoneToast(label);
}

document.getElementById('clear-done-btn').addEventListener('click', () => {

 doneItems=[]; save(); renderDone(); updateDoneCt();

function buildBreadcrumb(n) {
  const crumb = document.getElementById('drawer-breadcrumb');
  crumb.innerHTML = '';
  const path = [];
  let cur = n;
  while (cur) { path.unshift(cur); cur = nodes.find(x=>x.id===cur.parentId)||null; }
  path.forEach((node, i) => {
    if (i > 0) { const sep=document.createElement('span'); sep.textContent='›'; sep.style.opacity='.4'; crumb.appendChild(sep); }
    const sp=document.createElement('span');
    sp.textContent=node.label.toUpperCase();
    sp.style.color = i===path.length-1 ? getColor(node).border : 'var(--text3)';
    if (i===path.length-1) sp.style.fontWeight='700';
    crumb.appendChild(sp);
  });
}

function openModal(id) {
  const n = nodes.find(x=>x.id===id); if (!n) return;
  editingId = id;
  const c = getColor(n);
  const pal = THEME_PALETTES[currentTheme];
  document.getElementById('drawer-colorbar').style.background = `linear-gradient(90deg,${c.border},${pal[(n.colorIdx+4)%pal.length].border})`;
  document.getElementById('drawer-name').value = n.label;
  document.getElementById('drawer-desc').innerHTML = n.descHtml||'';
  document.getElementById('drawer-link').value = n.link||'';
  document.getElementById('drawer-img').value = n.imgUrl||'';
  drawerUpdateImgPrev(n.imgUrl);
  drawerSyncSwatches(n.colorIdx);
  drawerSyncShapes(n.shape);
  document.getElementById('drawer-star-btn').classList.toggle('on', !!n.starred);
  buildBreadcrumb(n);
  selectedId = id;
  render();
  setTimeout(() => {
    const el = document.getElementById('drawer');
    if (el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 60);
}

function closeModal() {
  if (editingId !== null) {
    const n = nodes.find(x=>x.id===editingId);
    if (n) {
      const v = document.getElementById('drawer-name').value.trim();
      n.label = v || n.label;
      n.descHtml = document.getElementById('drawer-desc').innerHTML;
      n.link = document.getElementById('drawer-link').value.trim();
      n.imgUrl = document.getElementById('drawer-img').value.trim();
      save();
    }
  }
  editingId = null;
  if (document.activeElement) document.activeElement.blur();
  render();
}

// ── Drawer swatches ──
function drawerSyncSwatches(ci) {
  document.querySelectorAll('#drawer-swatch-row .swatch').forEach((s,i) => s.classList.toggle('on', i===ci));
}
function drawerSyncShapes(shapeId) {
  document.querySelectorAll('#drawer-shape-row .shape-btn').forEach(b => b.classList.toggle('on', b.dataset.shape===(shapeId||'default')));
}
function drawerUpdateImgPrev(url) {
  const img = document.getElementById('drawer-img-prev');
  if (url) { img.src=url; img.style.display='block'; } else img.style.display='none';
}

// Build drawer swatch + shape rows once
(function() {
  const sr = document.getElementById('drawer-swatch-row');
  THEME_PALETTES[currentTheme]; // will rebuild on theme change via rebuildDrawerSwatches
  function buildSwatches() {
    const sr2 = document.getElementById('drawer-swatch-row');
    sr2.innerHTML = '';
    THEME_PALETTES[currentTheme].forEach((p,i) => {
      const s=document.createElement('div'); s.className='swatch';
      s.style.background=p.border; s.style.boxShadow=`0 0 7px ${p.border}`;
      s.addEventListener('click', () => {
        if (editingId===null) return;
        const n=nodes.find(x=>x.id===editingId); if(!n) return;
        n.colorIdx=i;
        const pal=THEME_PALETTES[currentTheme];
        document.getElementById('drawer-colorbar').style.background=`linear-gradient(90deg,${pal[i].border},${pal[(i+4)%pal.length].border})`;
        drawerSyncSwatches(i); save(); render();
      });
      sr2.appendChild(s);
    });
  }
  buildSwatches();
  window._rebuildDrawerSwatches = buildSwatches;
  
  const shapeRow = document.getElementById('drawer-shape-row');
  SHAPES.forEach(sh => {
    const b=document.createElement('button'); b.className='shape-btn'; b.dataset.shape=sh.id; b.textContent=sh.label;
    b.addEventListener('click', () => {
      if (editingId===null) return;
      const n=nodes.find(x=>x.id===editingId); if(!n) return;
      n.shape=sh.id; drawerSyncShapes(sh.id); save(); render();
    });
    shapeRow.appendChild(b);
  });
})();

// ── Render ──
function buildRows(parentId, depth) {
  return getChildren(parentId).flatMap(n => {
    const rows=[{node:n,depth}];
    if (!n.collapsed) rows.push(...buildRows(n.id, depth+1));
    return rows;
  });
}
function handleTap(id) {
  const now=Date.now();
  if (now-lastTap<360 && lastTapId===id) { openModal(id); lastTap=0; lastTapId=null }
  else { lastTap=now; lastTapId=id; selectedId=id===selectedId?null:id; render() }
}

function render() {
  const map = document.getElementById('view-map');
  // Save and detach drawer before clearing innerHTML
  const drawer = document.getElementById('drawer');
  const drawerParent = drawer.parentNode;
  drawerParent.removeChild(drawer);

  // Clear all node rows (canvas stays)
  Array.from(map.childNodes).forEach(n => {
    if (n.id !== 'map-canvas') n.remove();
  });

  if (!nodes.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;color:var(--text3);font-size:14px;margin-top:70px;line-height:2';
    empty.innerHTML = "What's on your mind? ✨<br><span style='font-size:12px;opacity:.5'>Type above and press Enter to start</span>";
    map.appendChild(empty);
    if (editingId === null) drawer.classList.remove('open');
    map.appendChild(drawer);
    return;
  }

  getRoots().forEach(root => {
    const rows = [{node:root,depth:0}];
    if (!root.collapsed) rows.push(...buildRows(root.id,1));

    rows.forEach(({node:n, depth}) => {
      const c=getColor(n), hasKids=getChildren(n.id).length>0, isSel=n.id===selectedId;
      const sticker = n.starred ? '⭐' : '';
      const descSnip = n.descHtml ? n.descHtml.replace(/<[^>]+>/g,'').slice(0,20) : '';

      const row = document.createElement('div');
      row.className='node-row'; row.dataset.nodeId=n.id;
      row.style.paddingLeft=(depth*22)+'px';

      if (depth > 0) {
        const conn=document.createElement('div'); conn.className='node-connector';
        conn.style.background=c.border; conn.style.boxShadow=`0 0 4px ${c.border}`;
        row.appendChild(conn);
      }

      const shapeClass = n.shape && n.shape !== 'default' ? ` shape-${n.shape}` : '';
      const card = document.createElement('div');
      card.className='node-card'+(isSel?' selected':'')+shapeClass;
      card.dataset.cardId=n.id;
      card.style.background=c.bg;
      card.style.borderColor=isSel?c.border:'rgba(255,255,255,0.04)';
      if (isSel) { card.style.setProperty('--sel-c',c.border); card.style.setProperty('--sel-g',c.glow); }

      if (hasKids) {
        const cb=document.createElement('button'); cb.className='collapse-btn';
        cb.style.borderColor=c.border; cb.style.color=c.border;
        cb.textContent=n.collapsed?'+':'−';
        cb.addEventListener('click', e=>{ e.stopPropagation(); toggleCollapse(n.id); });
        card.appendChild(cb);
      } else {
        const dot=document.createElement('div'); dot.className='node-dot';
        dot.style.background=c.border; dot.style.boxShadow=`0 0 5px ${c.border}`;
        card.appendChild(dot);
      }

      if (sticker) { const se=document.createElement('span'); se.className='node-sticker'; se.textContent=sticker; card.appendChild(se); }

      const lbl=document.createElement('span'); lbl.className='node-label'; lbl.dataset.id=n.id;
      lbl.style.color=c.text;
      if (isSel) lbl.style.textShadow=`0 0 10px ${c.border}`;
      lbl.textContent=n.label.toUpperCase();
      card.appendChild(lbl);

      if (descSnip) { const ds=document.createElement('span'); ds.className='node-snip'; ds.style.color=c.text; ds.textContent=descSnip; card.appendChild(ds); }

      const eb=document.createElement('button'); eb.className='node-edit-btn';
      eb.style.cssText=`background:${c.border};color:#000;box-shadow:0 0 7px ${c.glow}`;
      eb.textContent='Edit ✏️';
      eb.addEventListener('click', e=>{ e.stopPropagation(); openModal(n.id); });
      card.appendChild(eb);

      card.addEventListener('click', ()=>handleTap(n.id));
      row.appendChild(card);
      map.appendChild(row);

      // Inject drawer inline below the node being edited
      if (editingId === n.id) {
        drawer.classList.add('open');
        map.appendChild(drawer);
      }
    });

    const gap = document.createElement('div'); gap.className='branch-gap'; map.appendChild(gap);
  });

  // If editingId not found (e.g. node deleted), close drawer and re-attach
  if (editingId === null) drawer.classList.remove('open');
  if (!map.contains(drawer)) map.appendChild(drawer);
}

function renderDone() {
  const list=document.getElementById('done-list'), empty=document.getElementById('done-empty');
  list.innerHTML=''; empty.style.display=doneItems.length?'none':'block';
  doneItems.forEach((item,i) => {
    const card=document.createElement('div'); card.className='done-card';
    const dp=item.descHtml?`<div style="font-size:11px;color:var(--text2);margin-top:3px;line-height:1.5">${item.descHtml}</div>`:'';
    const lp=item.link?`<a href="${item.link}" target="_blank" rel="noopener" style="font-size:10px;color:var(--accent2);word-break:break-all;display:block;margin-top:3px">${item.link}</a>`:'';
    card.innerHTML=`<div style="font-size:22px;flex-shrink:0;margin-top:1px">✅</div>
      <div style="flex:1;min-width:0"><div class="done-lbl">${item.label}</div>${dp}${lp}<div class="done-meta">Archived ${item.archivedAt}</div></div>
      <div class="done-acts"><button class="done-act-btn del" data-del="${i}">Del 🗑️</button></div>`;
    list.appendChild(card);
  });
  list.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => deleteDoneItem(parseInt(b.dataset.del))));
}
