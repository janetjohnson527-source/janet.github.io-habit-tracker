<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<title>my habit tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf8f4;--bg2:#f0ebe3;--card:#ffffff;--ink:#1a1612;--muted:#8a7f74;--border:#e2dbd0;--sh:rgba(0,0,0,0.06);
}
.dark{
  --bg:#141210;--bg2:#1e1a17;--card:#252018;--ink:#f0e8de;--muted:#9a8f82;--border:#3a322a;--sh:rgba(0,0,0,0.3);
}
html,body{height:100%;background:var(--bg);transition:background 0.3s;}
body{font-family:'DM Sans',sans-serif;color:var(--ink);-webkit-text-size-adjust:100%;}
#root{min-height:100vh;background:var(--bg);transition:background 0.3s,color 0.3s;}
.ht{max-width:680px;margin:0 auto;width:100%;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1rem 0;}
.topbar h1{font-family:'Instrument Serif',serif;font-size:clamp(20px,5vw,26px);font-weight:400;color:var(--ink);letter-spacing:-0.02em;}
.topbar h1 em{font-style:italic;color:var(--muted);}
.dark-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;background:var(--bg2);color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.2s;}
.tabs{display:flex;padding:1rem 1rem 0;border-bottom:1.5px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{font-size:11px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;padding:6px 0 10px;margin-right:18px;cursor:pointer;color:var(--muted);border:none;border-bottom:2px solid transparent;margin-bottom:-1.5px;background:none;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.tab.active{color:var(--ink);border-bottom-color:var(--ink);}
.page{display:none;padding:1rem;}
.page.active{display:block;}
.slabel{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.add-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.add-row input{flex:1;font-family:'DM Sans',sans-serif;font-size:16px;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;background:var(--card);color:var(--ink);outline:none;min-width:0;}
.add-row input:focus{border-color:var(--ink);}
.add-row input::placeholder{color:var(--muted);}
.add-btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:11px 16px;border:none;border-radius:12px;background:var(--ink);color:var(--bg);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.color-grid{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.2rem;}
.cswatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform 0.15s;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.cswatch.sel{border-color:var(--ink);transform:scale(1.1);}
.hlist{display:flex;flex-direction:column;gap:10px;}
.hcard{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:1rem;}
.hhead{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.cpip{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.hname{font-size:15px;font-weight:400;color:var(--ink);flex:1;}
.dbtn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:4px 6px;-webkit-tap-highlight-color:transparent;}
.dgrid{display:flex;gap:3px;flex-wrap:wrap;}
.dcell{width:clamp(22px,7vw,26px);height:clamp(22px,7vw,26px);border-radius:5px;border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);-webkit-tap-highlight-color:transparent;transition:background 0.12s;}
.dcell.done{border:none;}
.dcell.today{box-shadow:0 0 0 2px var(--ink);}
.dcell.future{opacity:0.25;pointer-events:none;}
.mlbl{font-size:11px;color:var(--muted);margin-bottom:6px;}
.srow{display:flex;gap:8px;margin-top:12px;}
.sstat{background:var(--bg2);border-radius:10px;padding:8px 10px;flex:1;}
.sstat-lbl{font-size:10px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.sstat-val{font-family:'Instrument Serif',serif;font-size:20px;color:var(--ink);}
.empty{text-align:center;padding:2.5rem 0;color:var(--muted);font-size:14px;}
.mnav{display:flex;align-items:center;margin-bottom:1rem;background:var(--card);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;}
.mnav button{font-family:'DM Sans',sans-serif;background:none;border:none;padding:10px 16px;cursor:pointer;color:var(--ink);font-size:18px;line-height:1;-webkit-tap-highlight-color:transparent;}
.mnav span{flex:1;text-align:center;font-size:14px;font-weight:500;color:var(--ink);}
.dgrid2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1.2rem;}
.dcard{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:12px;}
.dval{font-family:'Instrument Serif',serif;font-size:26px;color:var(--ink);line-height:1;margin-bottom:3px;}
.dlbl{font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);}
.titem{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;margin-bottom:6px;-webkit-tap-highlight-color:transparent;}
.ccirc{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;}
.titem.chk .ccirc{border:none;color:#fff;}
.tname{font-size:14px;color:var(--ink);flex:1;}
.brow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);}
.brow:last-child{border-bottom:none;}
.btrack{flex:1;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden;}
.bfill{height:100%;border-radius:4px;}
.bpct{font-size:12px;font-weight:500;color:var(--muted);min-width:30px;text-align:right;}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(96px,26vw,126px),1fr));gap:10px;}
.vcard{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:10px 6px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:border-color 0.2s;}
.vname{font-size:11px;font-weight:500;color:var(--ink);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.vpct{font-family:'Instrument Serif',serif;font-size:17px;color:var(--ink);}
.vsub{font-size:10px;color:var(--muted);text-align:center;}
.vmood{font-size:10px;font-style:italic;color:var(--muted);text-align:center;min-height:13px;}
.pbar{width:80%;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-top:2px;}
.pbfill{height:100%;border-radius:2px;}
.ttoggle{display:flex;gap:4px;margin-bottom:1rem;background:var(--bg2);border-radius:12px;padding:4px;flex-wrap:wrap;}
.tbtn{flex:1;min-width:48px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;padding:5px 2px;border:none;border-radius:9px;background:transparent;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.15s;white-space:nowrap;text-align:center;}
.tbtn.active{background:var(--card);color:var(--ink);box-shadow:0 1px 4px var(--sh);}
.svg-wrap{width:86px;height:86px;display:flex;align-items:center;justify-content:center;}
/* last month */
.lm-summary{background:var(--bg2);border-radius:12px;padding:12px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:10px;}
.lm-summary-icon{font-size:22px;flex-shrink:0;}
.lm-summary-text{font-size:13px;color:var(--ink);flex:1;line-height:1.5;}
.lm-summary-text span{font-weight:500;}
.lm-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:1rem 1.2rem;display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.lm-left{flex:1;min-width:0;}
.lm-name{font-size:14px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px;}
.lm-bars{display:flex;flex-direction:column;gap:5px;}
.lm-bar-row{display:flex;align-items:center;gap:6px;}
.lm-bar-lbl{font-size:10px;color:var(--muted);width:24px;flex-shrink:0;}
.lm-track{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;}
.lm-fill{height:100%;border-radius:3px;}
.lm-pct{font-size:11px;color:var(--muted);min-width:30px;text-align:right;}
.lm-right{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;width:56px;}
.trend-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;}
.trend-up{background:#dcfce7;}
.dark .trend-up{background:#0d2410;}
.trend-same{background:var(--bg2);}
.trend-down{background:#fee2e2;}
.dark .trend-down{background:#2a0d0d;}
.trend-lbl{font-size:9px;font-weight:500;color:var(--muted);text-align:center;line-height:1.3;}
.trend-diff{font-size:12px;font-weight:500;}
.diff-up{color:#16a34a;}
.diff-same{color:var(--muted);}
.diff-down{color:#dc2626;}
@keyframes float{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-5px) rotate(1.5deg)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes wobble{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes drift{0%,100%{transform:translateX(0) translateY(0)}33%{transform:translateX(3px) translateY(-4px)}66%{transform:translateX(-2px) translateY(-6px)}}
@keyframes wiggle{0%,100%{transform:rotate(-2deg)}25%{transform:rotate(3deg)}75%{transform:rotate(-3deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.af{animation:float 3s ease-in-out infinite;display:inline-block;}
.ab{animation:bob 2s ease-in-out infinite;display:inline-block;}
.aw{animation:wobble 2.5s ease-in-out infinite;transform-origin:bottom center;display:inline-block;}
.abr{animation:breathe 2.5s ease-in-out infinite;display:inline-block;}
.ad{animation:drift 4s ease-in-out infinite;display:inline-block;}
.awg{animation:wiggle 2s ease-in-out infinite;display:inline-block;}
.apu{animation:pulse 2s ease-in-out infinite;display:inline-block;}
</style>
</head>
<body>
<div id="root">
<div class="ht">
  <div class="topbar">
    <h1>my <em>habit tracker</em></h1>
    <button class="dark-btn" id="dark-btn" onclick="toggleDark()">☽ dark</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('viz')">Progress</button>
    <button class="tab" onclick="showTab('dash')">Dashboard</button>
    <button class="tab" onclick="showTab('lastmonth')">Last month</button>
    <button class="tab" onclick="showTab('habits')">Habits</button>
  </div>

  <!-- PROGRESS -->
  <div class="page active" id="page-viz">
    <div class="mnav"><button onclick="chMo('viz',-1)">&#8592;</button><span id="viz-mo"></span><button onclick="chMo('viz',1)">&#8594;</button></div>
    <div class="ttoggle">
      <button class="tbtn active" onclick="setTheme('cats',this)">🐱</button>
      <button class="tbtn" onclick="setTheme('fairy',this)">✨</button>
      <button class="tbtn" onclick="setTheme('jelly',this)">🪼</button>
      <button class="tbtn" onclick="setTheme('balloon',this)">🎈</button>
      <button class="tbtn" onclick="setTheme('ghost',this)">👻</button>
      <button class="tbtn" onclick="setTheme('cloud',this)">⛅</button>
      <button class="tbtn" onclick="setTheme('planet',this)">🪐</button>
      <button class="tbtn" onclick="setTheme('dragon',this)">🐉</button>
      <button class="tbtn" onclick="setTheme('potion',this)">🧪</button>
      <button class="tbtn" onclick="setTheme('house',this)">🏚️</button>
      <button class="tbtn" onclick="setTheme('book',this)">📖</button>
      <button class="tbtn" onclick="setTheme('crystal',this)">💎</button>
      <button class="tbtn" onclick="setTheme('witch',this)">🧙</button>
    </div>
    <div id="viz-empty" class="empty" style="display:none">Add habits to see your progress!</div>
    <div class="vgrid" id="viz-grid"></div>
  </div>

  <!-- DASHBOARD -->
  <div class="page" id="page-dash">
    <div class="mnav"><button onclick="chMo('dash',-1)">&#8592;</button><span id="dash-mo"></span><button onclick="chMo('dash',1)">&#8594;</button></div>
    <div class="dgrid2" id="dash-summary"></div>
    <div style="margin-bottom:1.2rem"><div class="slabel">Today</div><div id="dash-today"></div></div>
    <div><div class="slabel" id="dash-plbl"></div><div id="dash-bars"></div></div>
  </div>

  <!-- LAST MONTH -->
  <div class="page" id="page-lastmonth">
    <div id="lm-summary-box"></div>
    <div id="lm-empty" class="empty" style="display:none">No habits yet!</div>
    <div id="lm-list"></div>
  </div>

  <!-- HABITS -->
  <div class="page" id="page-habits">
    <div class="slabel">New habit</div>
    <div class="add-row"><input type="text" id="hinput" placeholder="e.g. Morning walk, Read…" maxlength="40"/><button class="add-btn" onclick="addHabit()">+ Add</button></div>
    <div class="slabel">Pick a color</div>
    <div class="color-grid" id="cgrid"></div>
    <div class="slabel">Your habits</div>
    <div class="hlist" id="hlist"><div class="empty" id="hempty">No habits yet — add one above!</div></div>
  </div>
</div>
</div>

<script>
const COLS=['#ff6b6b','#ff8e53','#ffb347','#ffd93d','#c8e63c','#6bcb77','#2ed573','#00c9b1','#00b4d8','#4d96ff','#748ffc','#a29bfe','#c77dff','#e040fb','#ff5fa0','#fd79a8','#ff6348','#e84393','#00b894','#0984e3','#6c5ce7','#fab1a0','#81ecec','#ffeaa7','#dfe6e9','#b2bec3','#636e72','#fdcb6e','#55efc4','#ff9ff3'];
const MOS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MOODS={
  cats:['wide awake!','stretching...','warming up','getting comfy','all curled up','peak cozy zzz'],
  fairy:['a shimmer...','wings appear!','wand & glow','fairy dust!','wings lit up!','radiant! ✦'],
  jelly:['a tiny speck','a little bell','growing up!','tentacles!','glowing!','magnificent!'],
  balloon:['deflated...','inflating!','lifting off!','in the sky!','cloud level!','soaring free!'],
  ghost:['barely there','a faint wisp','taking shape','getting bold!','so friendly!','fully here!'],
  cloud:['stormy & sad','still cloudy','brightening!','sun peeking!','rainbow!','pure sunshine!'],
  planet:['bare rock...','ocean forms','land appears','lush world!','with rings!','magical! ✦'],
  dragon:['cozy egg...','cracking!','hatched!','wings out!','fire breath!','full glory! ✦'],
  potion:['empty vial','a drop...','brewing!','bubbling!','almost full!','pure magic! ✦'],
  house:['dark & spooky','lights off...','one light!','glowing!','cheery!','bright & happy!'],
  book:['dusty & shut','a glimmer...','pages glow','crackling!','sparking!','pure magic! ✦'],
  crystal:['dull shard','a little glow','growing!','cluster!','sparkling!','fairy ring! ✦'],
  witch:['apprentice...','with a broom!','riding high!','casting spells!','two wands!','fully powerful!']
};
const ANIMS={cats:'ab',fairy:'af',jelly:'ab',balloon:'ad',ghost:'af',cloud:'aw',planet:'abr',dragon:'awg',potion:'ab',house:'abr',book:'apu',crystal:'abr',witch:'af'};

let selCol=COLS[0],activeTab='viz',theme='cats',isDark=false;
const TODAY=new Date();TODAY.setHours(0,0,0,0);
let vizY=TODAY.getFullYear(),vizM=TODAY.getMonth();
let dashY=TODAY.getFullYear(),dashM=TODAY.getMonth();
let habits=[];
try{habits=JSON.parse(localStorage.getItem('ht_final2')||'[]');}catch(e){}
function save(){try{localStorage.setItem('ht_final2',JSON.stringify(habits));}catch(e){}}
function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
const TK=dk(TODAY);
function dim(y,m){return new Date(y,m+1,0).getDate();}
function mcomp(h,y,m){let c=0,t=dim(y,m);for(let i=1;i<=t;i++){const k=y+'-'+String(m+1).padStart(2,'0')+'-'+String(i).padStart(2,'0');if(h.done[k])c++;}return{c,t};}
function drk(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return'#'+[r,g,b].map(v=>Math.max(0,v-a).toString(16).padStart(2,'0')).join('');}
function lgt(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return'#'+[r,g,b].map(v=>Math.min(255,v+a).toString(16).padStart(2,'0')).join('');}
function stg(p){return p===0?0:p<0.2?1:p<0.4?2:p<0.6?3:p<0.8?4:5;}

function toggleDark(){
  isDark=!isDark;
  document.getElementById('root').classList.toggle('dark',isDark);
  document.body.classList.toggle('dark',isDark);
  document.getElementById('dark-btn').textContent=isDark?'☀ light':'☽ dark';
}

// Color swatches
const cg=document.getElementById('cgrid');
COLS.forEach((c,i)=>{const s=document.createElement('div');s.className='cswatch'+(i===0?' sel':'');s.style.background=c;s.onclick=()=>{selCol=c;document.querySelectorAll('.cswatch').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');};cg.appendChild(s);});

function showTab(t){
  activeTab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['viz','dash','lastmonth','habits'][i]===t));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  renderAll();
}
function renderActive(){
  renderViz();renderDash();renderLastMonth();
  if(activeTab==='habits')renderHabits();
}
function renderAll(){renderViz();renderDash();renderLastMonth();renderHabits();}
function setTheme(t,btn){theme=t;document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderViz();}
function chMo(v,d){
  if(v==='viz'){vizM+=d;if(vizM>11){vizM=0;vizY++;}if(vizM<0){vizM=11;vizY--;}renderViz();}
  else{dashM+=d;if(dashM>11){dashM=0;dashY++;}if(dashM<0){dashM=11;dashY--;}renderDash();}
}
document.getElementById('hinput').addEventListener('keydown',e=>{if(e.key==='Enter')addHabit();});

function addHabit(){
  const inp=document.getElementById('hinput'),name=inp.value.trim();
  if(!name)return;
  const h={id:Date.now(),name,color:selCol,done:{}};
  habits.push(h);inp.value='';save();
  
  
  renderAll();
}
function delHabit(id){
  habits=habits.filter(x=>x.id!==id);save();
  renderAll();
}
function togDay(id,key,el,col){
  const h=habits.find(x=>x.id===id);if(!h)return;
  h.done[key]=!h.done[key];save();
  if(h.done[key]){el.style.background=col;el.style.borderColor='transparent';el.textContent='';el.classList.add('done');}
  else{el.style.background='';el.style.borderColor='';el.textContent=parseInt(key.slice(-2));el.classList.remove('done');}
  const card=el.closest('.hcard');
  if(card){const y=TODAY.getFullYear(),m=TODAY.getMonth(),mt=dim(y,m);const{c}=mcomp(h,y,m),p=Math.round(c/mt*100);const vs=card.querySelectorAll('.sstat-val');if(vs[0])vs[0].textContent=c+'/'+mt;if(vs[1])vs[1].textContent=p+'%';}
  renderViz();renderDash();renderLastMonth();
}
function togToday(id){
  const h=habits.find(x=>x.id===id);if(!h)return;
  h.done[TK]=!h.done[TK];save();
  renderViz();renderDash();renderLastMonth();
}

// ─── SHARED HELPERS ───────────────────────────────────────────────
function face(cx,cy,sz,mood,col){
  const ex=cx-sz*0.32,ex2=cx+sz*0.32,ey=cy-sz*0.06;let s='';const sw=Math.max(0.8,sz*0.1);
  if(mood==='sleepy'){
    s+=`<path d="M${ex-sz*0.16} ${ey} Q${ex} ${ey-sz*0.15} ${ex+sz*0.16} ${ey}" fill="none" stroke="#222" stroke-width="${sw}" stroke-linecap="round"/>`;
    s+=`<path d="M${ex2-sz*0.16} ${ey} Q${ex2} ${ey-sz*0.15} ${ex2+sz*0.16} ${ey}" fill="none" stroke="#222" stroke-width="${sw}" stroke-linecap="round"/>`;
    s+=`<path d="M${cx-sz*0.2} ${cy+sz*0.28} Q${cx} ${cy+sz*0.2} ${cx+sz*0.2} ${cy+sz*0.28}" fill="none" stroke="#222" stroke-width="${sw*0.85}" stroke-linecap="round"/>`;
  } else if(mood==='neutral'){
    s+=`<circle cx="${ex}" cy="${ey}" r="${sz*0.12}" fill="#222"/>`;

// ─── POTION (bigger bottles, no overflow, more detail) ────────────
function drawPotion(pct,col){
  const st=stg(pct),mid=drk(col,22),lt=lgt(col,44),vlt=lgt(col,68);
  const fillLevels=[0,0.1,0.28,0.5,0.72,0.95];
  const bottleSizes=[0.7,0.8,0.9,1.0,1.1,1.2];
  const fl=fillLevels[st],bs=bottleSizes[st];
  // bottle dims scale with stage
  const bx=50,by=88,bw=18*bs,bh=32*bs;
  const neckW=8*bs,neckH=14*bs,neckY=by-bh-neckH;
  let s=`<svg width="86" height="86" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">`;
  s+=`<ellipse cx="${bx}" cy="${by+4}" rx="${bw+4}" ry="${4*bs}" fill="${mid}" opacity="0.2"/>`;
  // bottle body
  s+=`<path d="M${bx-neckW} ${by-bh} Q${bx-bw} ${by-bh+6} ${bx-bw} ${by} Q${bx-bw} ${by+2} ${bx} ${by+3} Q${bx+bw} ${by+2} ${bx+bw} ${by} Q${bx+bw} ${by-bh+6} ${bx+neckW} ${by-bh} Z" fill="${vlt}" opacity="0.55"/>`;
  // liquid fill
  if(fl>0){
    const fillY=by-bh*fl;
    const fillW=Math.min(bw,bw*0.85+bw*0.15*fl);

    s+=`<polygon points="${50},${cy-h} ${50-w},${cy-h+8} ${50-w},${cy+h-5} ${50},${cy+h} ${50+w},${cy+h-5} ${50+w},${cy-h+8}" fill="${col}"/>`;
    s+=`<polygon points="${50},${cy-h} ${50-w},${cy-h+8} ${50},${cy-h+13}" fill="${vlt}" opacity="0.7"/>`;
    s+=`<polygon points="${50},${cy-h} ${50+w},${cy-h+8} ${50},${cy-h+13}" fill="${lt}" opacity="0.5"/>`;
    s+=`<polygon points="${50-w},${cy-h+8} ${50-w},${cy+h-5} ${50},${cy+3}" fill="${mid}" opacity="0.3"/>`;
    s+=`<polygon points="${50+w},${cy-h+8} ${50+w},${cy+h-5} ${50},${cy+3}" fill="${lt}" opacity="0.22"/>`;
    s+=`<line x1="50" y1="${cy-h}" x2="50" y2="${cy-5}" stroke="${vlt}" stroke-width="3" opacity="0.6"/>`;
    s+=`<circle cx="50" cy="${cy-h}" r="5" fill="${vlt}" opacity="0.7"/>`;
    s+=`<circle cx="50" cy="${cy-h}" r="2.5" fill="white" opacity="0.5"/>`;
    s+=face(50,cy,13,'excited',col);
    // sparkle crown
    for(let i=0;i<8;i++){const a=i/8*Math.PI*2,r=22;const sx=50+Math.cos(a)*r,sy=cy-h+Math.sin(a)*12;s+=`<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="1.4" fill="${lgt(col,25)}" opacity="0.5"/>`;}
    s+=spk(14,44,lgt(col,20))+spk(86,44,lgt(col,20))+spk(50,26,lgt(col,20));
  }
  return s+'</svg>';
}

const drawFns={cats:drawCat,fairy:drawFairy,jelly:drawJelly,balloon:drawBalloon,ghost:drawGhost,cloud:drawCloud,planet:drawPlanet,dragon:drawDragon,potion:drawPotion,house:drawHouse,book:drawBook,crystal:drawCrystal,witch:drawWitch};

// ─── RENDER FUNCTIONS ─────────────────────────────────────────────
function renderViz(){
  document.getElementById('viz-mo').textContent=MOS[vizM]+' '+vizY;
  const grid=document.getElementById('viz-grid'),empty=document.getElementById('viz-empty');
  if(!habits.length){empty.style.display='block';grid.innerHTML='';return;}
  empty.style.display='none';
  const isFut=(vizY>TODAY.getFullYear())||(vizY===TODAY.getFullYear()&&vizM>TODAY.getMonth());
  const moods=MOODS[theme],anim=ANIMS[theme],drawFn=drawFns[theme];
  // Sort by completion % descending
  const sorted=[...habits].map(h=>{
    const{c,t}=mcomp(h,vizY,vizM);
    const pct=isFut?0:c/t;
    return{h,c,t,pct};
  }).sort((a,b)=>b.pct-a.pct);
  grid.innerHTML=sorted.map(({h,c,t,pct})=>{
    const st=stg(pct);
    return`<div class="vcard"><div class="svg-wrap"><div class="${anim}">${drawFn(pct,h.color)}</div></div><div class="vname" title="${h.name}">${h.name}</div><div class="vpct">${isFut?'—':Math.round(pct*100)+'%'}</div><div class="vsub">${isFut?'future':c+' / '+t+' days'}</div><div class="vmood">${moods[st]}</div><div class="pbar"><div class="pbfill" style="width:${Math.round(pct*100)}%;background:${h.color};"></div></div></div>`;
  }).join('');
}

function renderDash(){
  document.getElementById('dash-mo').textContent=MOS[dashM]+' '+dashY;
  document.getElementById('dash-plbl').textContent=MOS[dashM]+' progress';
  const doneT=habits.filter(h=>h.done[TK]).length,total=habits.length;
  const mdt=dim(dashY,dashM),mc=habits.reduce((s,h)=>s+mcomp(h,dashY,dashM).c,0),mp=habits.length*mdt;
  document.getElementById('dash-summary').innerHTML=`
    <div class="dcard"><div class="dval">${total}</div><div class="dlbl">Habits</div></div>
    <div class="dcard"><div class="dval">${doneT}/${total}</div><div class="dlbl">Today</div></div>
    <div class="dcard"><div class="dval">${mp>0?Math.round(mc/mp*100):0}%</div><div class="dlbl">${MOS[dashM].slice(0,3)} rate</div></div>
    <div class="dcard"><div class="dval">${mc}</div><div class="dlbl">Days done</div></div>
  `;
  const isNow=dashY===TODAY.getFullYear()&&dashM===TODAY.getMonth();
  if(!habits.length){
    document.getElementById('dash-today').innerHTML='<div style="color:var(--muted);font-size:13px;padding:.5rem 0 1rem">No habits yet.</div>';
    document.getElementById('dash-bars').innerHTML='';return;
  }
  document.getElementById('dash-today').innerHTML=isNow
    ?habits.map(h=>{const done=h.done[TK];return`<div class="titem${done?' chk':''}" onclick="togToday(${h.id})"><div class="ccirc" style="${done?'background:'+h.color:''}">${done?'&#10003;':''}</div><span class="tname">${h.name}</span></div>`;}).join('')
    :'<div style="color:var(--muted);font-size:13px;padding:.5rem 0 1rem">Go to current month to check off today.</div>';
  document.getElementById('dash-bars').innerHTML=habits.map(h=>{
    const{c}=mcomp(h,dashY,dashM),p=Math.round(c/mdt*100);
    return`<div class="brow"><div class="cpip" style="background:${h.color};width:9px;height:9px;border-radius:50%;flex-shrink:0;"></div><div style="font-size:13px;color:var(--ink);width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;">${h.name}</div><div class="btrack"><div class="bfill" style="width:${p}%;background:${h.color};"></div></div><div class="bpct">${p}%</div></div>`;
  }).join('');
}

function renderLastMonth(){
  const thisY=TODAY.getFullYear(),thisM=TODAY.getMonth();
  const lastM=thisM===0?11:thisM-1,lastY=thisM===0?thisY-1:thisY;
  const lmName=MOS[lastM],tmName=MOS[thisM];
  const list=document.getElementById('lm-list'),empty=document.getElementById('lm-empty'),sumBox=document.getElementById('lm-summary-box');
  if(!habits.length){empty.style.display='block';list.innerHTML='';sumBox.innerHTML='';return;}
  empty.style.display='none';
  let improved=0,declined=0,same=0;
  const cards=habits.map(h=>{
    const{c:tc,t:tt}=mcomp(h,thisY,thisM);
    const{c:lc,t:lt2}=mcomp(h,lastY,lastM);
    const thisPct=tt>0?Math.round(tc/tt*100):0;
    const lastPct=lt2>0?Math.round(lc/lt2*100):0;
    const diff=thisPct-lastPct;
    const absDiff=Math.abs(diff);
    let icon,iconClass,trendClass,trendLbl,diffStr;
    if(absDiff<=5){same++;icon='→';iconClass='trend-same';trendClass='diff-same';trendLbl='about the same';diffStr=diff===0?'±0%':(diff>0?'+':'')+diff+'%';}
    else if(diff>0){improved++;icon='↑';iconClass='trend-up';trendClass='diff-up';trendLbl='improving!';diffStr='+'+diff+'%';}
    else{declined++;icon='↓';iconClass='trend-down';trendClass='diff-down';trendLbl='dropped';diffStr=diff+'%';}
    return`<div class="lm-card">
      <div class="lm-left">
        <div class="lm-name">${h.name}</div>
        <div class="lm-bars">
          <div class="lm-bar-row">
            <div class="lm-bar-lbl">${lmName.slice(0,3)}</div>
            <div class="lm-track"><div class="lm-fill" style="width:${lastPct}%;background:${h.color};opacity:0.4;"></div></div>
            <div class="lm-pct">${lastPct}%</div>
          </div>
          <div class="lm-bar-row">
            <div class="lm-bar-lbl" style="font-weight:500;color:var(--ink)">${tmName.slice(0,3)}</div>
            <div class="lm-track"><div class="lm-fill" style="width:${thisPct}%;background:${h.color};"></div></div>
            <div class="lm-pct" style="font-weight:500;color:var(--ink)">${thisPct}%</div>
          </div>
        </div>
      </div>
      <div class="lm-right">
        <div class="trend-icon ${iconClass}">${icon}</div>
        <div class="trend-lbl">${trendLbl}</div>
        <div class="trend-diff ${trendClass}">${diffStr}</div>
      </div>
    </div>`;
  });
  let summaryIcon,summaryText;
  if(!habits.length){summaryIcon='✨';summaryText='Add habits to start tracking!';}
  else if(improved>declined&&improved>same){summaryIcon='🌟';summaryText=`You improved on <span>${improved} of ${habits.length}</span> habits vs ${lmName}. Keep it up!`;}
  else if(declined>improved&&declined>same){summaryIcon='💪';summaryText=`${declined} habit${declined>1?'s':''} dipped vs ${lmName} — you've got this month to bounce back!`;}
  else if(same>=improved&&same>=declined){summaryIcon='✨';summaryText=`Staying consistent! Most habits are about the same as ${lmName}.`;}
  else{summaryIcon='📈';summaryText=`Mixed month — <span>${improved}</span> up, <span>${declined}</span> down vs ${lmName}. Every day counts!`;}
  sumBox.innerHTML=`<div class="lm-summary"><div class="lm-summary-icon">${summaryIcon}</div><div class="lm-summary-text">${summaryText}</div></div>`;
  list.innerHTML=cards.join('');
}

function buildCard(h){
  const days=[];for(let i=27;i>=0;i--){const d=new Date(TODAY);d.setDate(TODAY.getDate()-i);days.push(d);}
  const y=TODAY.getFullYear(),m=TODAY.getMonth(),mt=dim(y,m);
  const{c}=mcomp(h,y,m),p=Math.round(c/mt*100);
  const cells=days.map(d=>{
    const key=dk(d),isT=d.getTime()===TODAY.getTime(),isFut=d>TODAY,done=h.done[key];
    let cls='dcell';if(done)cls+=' done';if(isT)cls+=' today';if(isFut)cls+=' future';
    return`<div class="${cls}" style="${done?'background:'+h.color:''}" onclick="togDay(${h.id},'${key}',this,'${h.color}')" title="${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}">${!done?d.getDate():''}</div>`;
  }).join('');
  return`<div class="hcard" data-hid="${h.id}"><div class="hhead"><div class="cpip" style="background:${h.color}"></div><span class="hname">${h.name}</span><button class="dbtn" onclick="delHabit(${h.id})">&#x2715;</button></div><div class="mlbl">Last 28 days — tap to toggle</div><div class="dgrid">${cells}</div><div class="srow"><div class="sstat"><div class="sstat-lbl">This month</div><div class="sstat-val">${c}/${mt}</div></div><div class="sstat"><div class="sstat-lbl">Monthly rate</div><div class="sstat-val">${p}%</div></div></div></div>`;
}

function renderHabits(){
  const list=document.getElementById('hlist'),empty=document.getElementById('hempty');
  if(!habits.length){list.innerHTML='';list.appendChild(empty);empty.style.display='block';return;}
  empty.style.display='none';
  list.innerHTML=habits.map(h=>buildCard(h)).join('');
}

// Init
renderViz();renderDash();renderHabits();
</script>
