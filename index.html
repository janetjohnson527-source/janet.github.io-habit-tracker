
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--cream:#faf8f4;--ink:#1a1612;--muted:#8a7f74;--border:#e8e2d9;--card:white;}
body{font-family:'DM Sans',sans-serif;background:transparent;-webkit-text-size-adjust:100%;}
.ht{max-width:680px;width:100%;}
.header{padding:1.2rem 1rem 0;}
.header h1{font-family:'Instrument Serif',serif;font-size:clamp(22px,5vw,28px);font-weight:400;color:var(--ink);letter-spacing:-0.02em;line-height:1;}
.header h1 em{font-style:italic;color:var(--muted);}
.tabs{display:flex;padding:1rem 1rem 0;border-bottom:1.5px solid var(--border);}
.tab{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;padding:6px 0 10px;margin-right:20px;cursor:pointer;color:var(--muted);border:none;border-bottom:2px solid transparent;margin-bottom:-1.5px;background:none;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.tab.active{color:var(--ink);border-bottom-color:var(--ink);}
.page{display:none;padding:1rem;}
.page.active{display:block;}
.section-label{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.add-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.add-row input{flex:1;font-family:'DM Sans',sans-serif;font-size:16px;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;background:white;color:var(--ink);outline:none;min-width:0;}
.add-row input:focus{border-color:var(--ink);}
.add-row input::placeholder{color:var(--muted);}
.add-btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:11px 16px;border:none;border-radius:12px;background:var(--ink);color:white;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.color-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.2rem;}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform 0.15s;-webkit-tap-highlight-color:transparent;}
.color-swatch.selected{border-color:var(--ink);transform:scale(1.1);}
.habits{display:flex;flex-direction:column;gap:10px;}
.habit-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:1rem;}
.habit-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.color-pip{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.habit-name{font-size:15px;font-weight:400;color:var(--ink);flex:1;}
.del-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:4px 6px;line-height:1;-webkit-tap-highlight-color:transparent;}
.grid{display:flex;gap:3px;flex-wrap:wrap;}
.day-cell{width:clamp(22px,7vw,26px);height:clamp(22px,7vw,26px);border-radius:5px;border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);-webkit-tap-highlight-color:transparent;transition:background 0.15s,border-color 0.15s;}
.day-cell.done{border:none;}
.day-cell.today{box-shadow:0 0 0 2px var(--ink);}
.day-cell.future{opacity:0.25;pointer-events:none;}
.month-lbl{font-size:11px;color:var(--muted);margin-bottom:6px;}
.stats-row{display:flex;gap:8px;margin-top:12px;}
.stat{background:var(--cream);border-radius:10px;padding:8px 10px;flex:1;}
.stat-label{font-size:10px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.stat-val{font-family:'Instrument Serif',serif;font-size:20px;color:var(--ink);}
.empty{text-align:center;padding:2.5rem 0;color:var(--muted);font-size:14px;}
.month-nav{display:flex;align-items:center;margin-bottom:1.2rem;background:white;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;}
.month-nav button{font-family:'DM Sans',sans-serif;background:none;border:none;padding:10px 16px;cursor:pointer;color:var(--ink);font-size:18px;line-height:1;-webkit-tap-highlight-color:transparent;}
.month-nav button:active{background:var(--cream);}
.month-nav span{flex:1;text-align:center;font-size:14px;font-weight:500;color:var(--ink);}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.2rem;}
.dash-card{background:white;border:1.5px solid var(--border);border-radius:14px;padding:12px;}
.dash-val{font-family:'Instrument Serif',serif;font-size:26px;color:var(--ink);line-height:1;margin-bottom:3px;}
.dash-label{font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);}
.today-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:white;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;margin-bottom:6px;-webkit-tap-highlight-color:transparent;}
.today-item:active{background:var(--cream);}
.check-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;}
.today-item.checked .check-circle{border:none;color:white;}
.today-name{font-size:14px;color:var(--ink);flex:1;}
.bar-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);}
.bar-row:last-child{border-bottom:none;}
.bar-track{flex:1;height:7px;background:#f0ece6;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.bar-pct{font-size:12px;font-weight:500;color:var(--muted);min-width:30px;text-align:right;}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(110px,28vw,140px),1fr));gap:12px;}
.cat-card{background:white;border:1.5px solid var(--border);border-radius:16px;padding:12px 10px;display:flex;flex-direction:column;align-items:center;gap:5px;}
.cat-name{font-size:11px;font-weight:500;color:var(--ink);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.cat-pct{font-family:'Instrument Serif',serif;font-size:18px;color:var(--ink);}
.cat-sub{font-size:10px;color:var(--muted);text-align:center;}
.cat-mood{font-size:10px;font-style:italic;color:var(--muted);text-align:center;}
.pct-bar{width:80%;height:4px;background:#f0ece6;border-radius:2px;overflow:hidden;margin-top:2px;}
.pct-bar-fill{height:100%;border-radius:2px;}
</style>

<div class="ht">
  <div class="header"><h1>my habits <em>— cozy cats</em></h1></div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('cats')">Cats</button>
    <button class="tab" onclick="showTab('dashboard')">Dashboard</button>
    <button class="tab" onclick="showTab('habits')">Habits</button>
  </div>

  <div class="page active" id="page-cats">
    <div class="month-nav">
      <button onclick="changeMonth('cats',-1)">&#8592;</button>
      <span id="cats-month-label"></span>
      <button onclick="changeMonth('cats',1)">&#8594;</button>
    </div>
    <div id="cats-empty" class="empty" style="display:none;">Add habits to wake up your cats!</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <div class="page" id="page-dashboard">
    <div class="month-nav">
      <button onclick="changeMonth('dash',-1)">&#8592;</button>
      <span id="dash-month-label"></span>
      <button onclick="changeMonth('dash',1)">&#8594;</button>
    </div>
    <div class="dash-grid" id="dash-summary"></div>
    <div style="margin-bottom:1.2rem;">
      <div class="section-label">Today</div>
      <div id="dash-today"></div>
    </div>
    <div>
      <div class="section-label" id="dash-month-progress-label"></div>
      <div id="dash-bars"></div>
    </div>
  </div>

  <div class="page" id="page-habits">
    <div class="section-label">New habit</div>
    <div class="add-row">
      <input type="text" id="habit-input" placeholder="e.g. Morning walk, Read…" maxlength="40"/>
      <button class="add-btn" onclick="addHabit()">+ Add</button>
    </div>
    <div class="section-label">Pick a color</div>
    <div class="color-grid" id="color-grid"></div>
    <div class="section-label">Your habits</div>
    <div class="habits" id="habits-list">
      <div class="empty" id="empty-msg">No habits yet — add one above!</div>
    </div>
  </div>
</div>

<script>
const COLORS=['#ff6b6b','#ff9f43','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff5fa0','#00c9b1','#ff7f50','#a29bfe','#fd79a8','#00b894','#e17055','#74b9ff','#55efc4','#fdcb6e','#e84393','#0984e3','#fab1a0','#81ecec','#ff6348','#2ed573','#eccc68','#a4b0be'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MOODS=['just woke up...','stretching a little','warming up','getting comfy','all curled up','peak cozy mode'];
let selectedColor=COLORS[0];
const TODAY=new Date();TODAY.setHours(0,0,0,0);
let catsYear=TODAY.getFullYear(),catsMonth=TODAY.getMonth();
let dashYear=TODAY.getFullYear(),dashMonth=TODAY.getMonth();
let activeTab='cats';
let habits=[];
try{habits=JSON.parse(localStorage.getItem('ht_v7')||'[]');}catch(e){}
function save(){try{localStorage.setItem('ht_v7',JSON.stringify(habits));}catch(e){}}
function dateKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
const todayKey=dateKey(TODAY);
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function monthCompletions(h,y,m){let c=0,t=daysInMonth(y,m);for(let i=1;i<=t;i++){const k=y+'-'+String(m+1).padStart(2,'0')+'-'+String(i).padStart(2,'0');if(h.done[k])c++;}return{count:c,total:t};}

const cg=document.getElementById('color-grid');
COLORS.forEach((c,i)=>{
  const s=document.createElement('div');
  s.className='color-swatch'+(i===0?' selected':'');
  s.style.background=c;
  s.onclick=()=>{selectedColor=c;document.querySelectorAll('.color-swatch').forEach(x=>x.classList.remove('selected'));s.classList.add('selected');};
  cg.appendChild(s);
});

function showTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['cats','dashboard','habits'][i]===tab));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  renderActive();
}

function renderActive(){
  if(activeTab==='cats') renderCats();
  else if(activeTab==='dashboard') renderDashboard();
  else renderHabits();
}

function changeMonth(view,dir){
  if(view==='cats'){catsMonth+=dir;if(catsMonth>11){catsMonth=0;catsYear++;}if(catsMonth<0){catsMonth=11;catsYear--;}renderCats();}
  else{dashMonth+=dir;if(dashMonth>11){dashMonth=0;dashYear++;}if(dashMonth<0){dashMonth=11;dashYear--;}renderDashboard();}
}

document.getElementById('habit-input').addEventListener('keydown',e=>{if(e.key==='Enter')addHabit();});

function addHabit(){
  const name=document.getElementById('habit-input').value.trim();if(!name)return;
  habits.push({id:Date.now(),name,color:selectedColor,done:{}});
  document.getElementById('habit-input').value='';
  save();renderActive();
}

function deleteHabit(id){
  habits=habits.filter(x=>x.id!==id);
  save();renderActive();
}

// Toggle a day cell IN PLACE — no full re-render
function toggleDay(id, key, el, color){
  const h=habits.find(x=>x.id===id);if(!h)return;
  h.done[key]=!h.done[key];
  save();
  const done=h.done[key];
  if(done){
    el.style.background=color;
    el.style.border='none';
    el.textContent='';
    el.classList.add('done');
  } else {
    el.style.background='';
    el.style.border='';
    el.textContent=key.slice(-2).replace(/^0/,'');
    el.classList.remove('done');
  }
  // Update this card's stat numbers in place
  const card=el.closest('.habit-card');
  if(card){
    const y=TODAY.getFullYear(),m=TODAY.getMonth(),mDaysTotal=daysInMonth(y,m);
    const{count}=monthCompletions(h,y,m),pct=Math.round(count/mDaysTotal*100);
    const vals=card.querySelectorAll('.stat-val');
    if(vals[0])vals[0].textContent=count+'/'+mDaysTotal;
    if(vals[1])vals[1].textContent=pct+'%';
  }
}

function toggleTodayDash(id){
  const h=habits.find(x=>x.id===id);if(!h)return;
  h.done[todayKey]=!h.done[todayKey];
  save();renderDashboard();
}

function darken(hex,amt){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'#'+[r,g,b].map(v=>Math.max(0,v-amt).toString(16).padStart(2,'0')).join('');}
function lighten(hex,amt){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'#'+[r,g,b].map(v=>Math.min(255,v+amt).toString(16).padStart(2,'0')).join('');}

function drawCat(pct,color,size){
  const s=size||100;
  const stage=pct===0?0:pct<0.2?1:pct<0.4?2:pct<0.6?3:pct<0.8?4:5;
  const dark=darken(color,40),mid=darken(color,15),light=lighten(color,45),nose='#e88888',eye='#1a1612';
  let svg=`<svg width="${s}" height="${s}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">`;
  if(stage===0){
    svg+=`<path d="M52 82 Q80 85 78 70 Q76 58 62 62" fill="none" stroke="${mid}" stroke-width="5" stroke-linecap="round"/>`;
    svg+=`<ellipse cx="50" cy="72" rx="20" ry="18" fill="${color}"/>`;
    svg+=`<ellipse cx="50" cy="46" rx="17" ry="16" fill="${color}"/>`;
    svg+=`<polygon points="36,36 32,22 44,32" fill="${color}"/><polygon points="64,36 68,22 56,32" fill="${color}"/>`;
    svg+=`<polygon points="37,34 34,25 43,32" fill="${light}"/><polygon points="63,34 66,25 57,32" fill="${light}"/>`;
    svg+=`<line x1="38" y1="42" x2="33" y2="38" stroke="${mid}" stroke-width="1.2" stroke-linecap="round"/>`;
    svg+=`<line x1="36" y1="46" x2="30" y2="44" stroke="${mid}" stroke-width="1.2" stroke-linecap="round"/>`;
    svg+=`<line x1="62" y1="42" x2="67" y2="38" stroke="${mid}" stroke-width="1.2" stroke-linecap="round"/>`;
    svg+=`<line x1="64" y1="46" x2="70" y2="44" stroke="${mid}" stroke-width="1.2" stroke-linecap="round"/>`;
    svg+=`<ellipse cx="43" cy="46" rx="4.5" ry="5" fill="white"/><ellipse cx="57" cy="46" rx="4.5" ry="5" fill="white"/>`;
    svg+=`<ellipse cx="43" cy="47" rx="2.8" ry="3.5" fill="${eye}"/><ellipse cx="57" cy="47" rx="2.8" ry="3.5" fill="${eye}"/>`;
    svg+=`<circle cx="44" cy="46" r="0.9" fill="white"/><circle cx="58" cy="46" r="0.9" fill="white"/>`;
    svg+=`<ellipse cx="50" cy="52" rx="2" ry="1.4" fill="${nose}"/>`;
    svg+=`<path d="M47 54 Q50 57 53 54" fill="none" stroke="${mid}" stroke-width="1" stroke-linecap="round"/>`;
    svg+=`<line x1="32" y1="51" x2="47" y2="53" stroke="${mid}" stroke-width="0.8" opacity="0.7"/><line x1="32" y1="54" x2="47" y2="54" stroke="${mid}" stroke-width="0.8" opacity="0.7"/>`;
    svg+=`<line x1="68" y1="51" x2="53" y2="53" stroke="${mid}" stroke-width="0.8" opacity="0.7"/><line x1="68" y1="54" x2="53" y2="54" stroke="${mid}" stroke-width="0.8" opacity="0.7"/>`;
    svg+=`<ellipse cx="38" cy="87" rx="7" ry="4" fill="${mid}"/><ellipse cx="62" cy="87" rx="7" ry="4" fill="${mid}"/>`;
  } else if(stage===1){
    svg+=`<path d="M52 83 Q78 86 76 72 Q74 60 61 63" fill="none" stroke="${mid}" stroke-width="5" stroke-linecap="round"/>`;
    svg+=`<ellipse cx="50" cy="72" rx="20" ry="17" fill="${color}"/><ellipse cx="50" cy="47" rx="17" ry="16" fill="${color}"/>`;
    svg+=`<polygon points="36,37 32,23 44,33" fill="${color}"/><polygon points="64,37 68,23 56,33" fill="${color}"/>`;
    svg+=`<polygon points="37,35 34,26 43,33" fill="${light}"/><polygon points="63,35 66,26 57,33" fill="${light}"/>`;
    svg+=`<ellipse cx="43" cy="47" rx="4.5" ry="4" fill="white"/><ellipse cx="57" cy="47" rx="4.5" ry="4" fill="white"/>`;
    svg+=`<ellipse cx="43" cy="48" rx="2.8" ry="2.5" fill="${eye}"/><ellipse cx="57" cy="48" rx="2.8" ry="2.5" fill="${eye}"/>`;
    svg+=`<path d="M38.5 44 Q43 42 47.5 44" fill="${color}"/><path d="M52.5 44 Q57 42 61.5 44" fill="${color}"/>`;
    svg+=`<ellipse cx="50" cy="53" rx="2" ry="1.4" fill="${nose}"/>`;
    svg+=`<path d="M47 55 Q50 57.5 53 55" fill="none" stroke="${mid}" stroke-width="1" stroke-linecap="round"/>`;
    svg+=`<line x1="32" y1="52" x2="47" y2="54" stroke="${mid}" stroke-width="0.8" opacity="0.6"/><line x1="32" y1="55" x2="47" y2="55" stroke="${mid}" stroke-width="0.8" opacity="0.6"/>`;
    svg+=`<line x1="68" y1="52" x2="53" y2="54" stroke="${mid}" stroke-width="0.8" opacity="0.6"/><line x1="68" y1="55" x2="53" y2="55" stroke="${mid}" stroke-width="0.8" opacity="0.6"/>`;
    svg+=`<ellipse cx="38" cy="87" rx="7" ry="4" fill="${mid}"/><ellipse cx="62" cy="87" rx="7" ry="4" fill="${mid}"/>`;
  } else if(stage===2){
    svg+=`<path d="M54 82 Q76 87 74 74 Q72 63 60 65" fill="none" stroke="${mid}" stroke-width="5" stroke-linecap="round"/>`;
    svg+=`<ellipse cx="50" cy="73" rx="21" ry="16" fill="${color}"/><ellipse cx="50" cy="50" rx="16" ry="15" fill="${color}"/>`;
    svg+=`<polygon points="37,41 33,27 44,37" fill="${color}"/><polygon points="63,41 67,27 56,37" fill="${color}"/>`;
    svg+=`<polygon points="38,39 35,29 43,37" fill="${light}"/><polygon points="62,39 65,29 57,37" fill="${light}"/>`;
    svg+=`<ellipse cx="43" cy="50" rx="4.5" ry="2.5" fill="white"/><ellipse cx="57" cy="50" rx="4.5" ry="2.5" fill="white"/>`;
    svg+=`<ellipse cx="43" cy="50.5" rx="2.8" ry="1.5" fill="${eye}"/><ellipse cx="57" cy="50.5" rx="2.8" ry="1.5" fill="${eye}"/>`;
    svg+=`<path d="M38.5 47.5 Q43 46 47.5 47.5" fill="${color}"/><path d="M52.5 47.5 Q57 46 61.5 47.5" fill="${color}"/>`;
    svg+=`<ellipse cx="50" cy="56" rx="2" ry="1.3" fill="${nose}"/>`;
    svg+=`<line x1="33" y1="55" x2="47" y2="57" stroke="${mid}" stroke-width="0.8" opacity="0.5"/><line x1="67" y1="55" x2="53" y2="57" stroke="${mid}" stroke-width="0.8" opacity="0.5"/>`;
    svg+=`<ellipse cx="38" cy="87" rx="6" ry="3.5" fill="${mid}"/><ellipse cx="62" cy="87" rx="6" ry="3.5" fill="${mid}"/>`;
  } else if(stage===3){
    svg+=`<path d="M56 75 Q75 80 72 68 Q70 59 60 62" fill="none" stroke="${mid}" stroke-width="4.5" stroke-linecap="round"/>`;
    svg+=`<rect x="24" y="62" width="52" height="26" rx="14" fill="${color}"/>`;
    svg+=`<ellipse cx="50" cy="54" rx="16" ry="14" fill="${color}"/>`;
    svg+=`<polygon points="37,43 33,30 44,41" fill="${color}"/><polygon points="63,43 67,30 56,41" fill="${color}"/>`;
    svg+=`<polygon points="38,42 35,32 43,41" fill="${light}"/><polygon points="62,42 65,32 57,41" fill="${light}"/>`;
    svg+=`<path d="M38.5 53 Q43 51 47.5 53" fill="none" stroke="${eye}" stroke-width="1.8" stroke-linecap="round"/>`;
    svg+=`<path d="M52.5 53 Q57 51 61.5 53" fill="none" stroke="${eye}" stroke-width="1.8" stroke-linecap="round"/>`;
    svg+=`<ellipse cx="50" cy="58" rx="1.8" ry="1.2" fill="${nose}"/>`;
    svg+=`<line x1="33" y1="57" x2="47" y2="59" stroke="${mid}" stroke-width="0.7" opacity="0.5"/><line x1="67" y1="57" x2="53" y2="59" stroke="${mid}" stroke-width="0.7" opacity="0.5"/>`;
    svg+=`<ellipse cx="38" cy="88" rx="5" ry="3" fill="${mid}"/><ellipse cx="62" cy="88" rx="5" ry="3" fill="${mid}"/>`;
  } else if(stage===4){
    svg+=`<ellipse cx="50" cy="80" rx="30" ry="10" fill="${lighten(color,55)}"/>`;
    svg+=`<ellipse cx="50" cy="70" rx="24" ry="18" fill="${color}"/>`;
    svg+=`<path d="M26 70 Q18 88 38 88 Q58 88 62 76" fill="none" stroke="${mid}" stroke-width="5.5" stroke-linecap="round"/>`;
    svg+=`<ellipse cx="60" cy="57" rx="14" ry="13" fill="${color}"/>`;
    svg+=`<polygon points="52,47 50,35 60,46" fill="${color}"/><polygon points="68,48 72,36 62,47" fill="${color}"/>`;
    svg+=`<polygon points="53,46 51,37 59,46" fill="${light}"/><polygon points="67,47 70,38 63,47" fill="${light}"/>`;
    svg+=`<path d="M55 57 Q60 55 65 57" fill="none" stroke="${eye}" stroke-width="1.8" stroke-linecap="round"/>`;
    svg+=`<ellipse cx="67" cy="57" rx="3.5" ry="3.5" fill="white"/><ellipse cx="67.5" cy="57.5" rx="2" ry="2.2" fill="${eye}"/>`;
    svg+=`<circle cx="68" cy="56.5" r="0.7" fill="white"/>`;
    svg+=`<ellipse cx="57" cy="62" rx="1.6" ry="1.1" fill="${nose}"/>`;
  } else {
    svg+=`<ellipse cx="50" cy="80" rx="33" ry="12" fill="${lighten(color,55)}"/>`;
    svg+=`<ellipse cx="50" cy="68" rx="26" ry="22" fill="${color}"/>`;
    svg+=`<path d="M24 68 Q16 90 42 90 Q64 90 66 74 Q67 62 56 60" fill="none" stroke="${mid}" stroke-width="6" stroke-linecap="round"/>`;
    svg+=`<ellipse cx="58" cy="52" rx="13" ry="12" fill="${color}"/>`;
    svg+=`<polygon points="50,43 49,32 58,43" fill="${color}"/><polygon points="66,44 70,33 61,44" fill="${color}"/>`;
    svg+=`<polygon points="51,42 50,34 57,43" fill="${light}"/><polygon points="65,43 69,35 62,44" fill="${light}"/>`;
    svg+=`<path d="M51 52 Q55.5 50 60 52" fill="none" stroke="${eye}" stroke-width="1.8" stroke-linecap="round"/>`;
    svg+=`<path d="M61 52 Q65 50 69 52" fill="none" stroke="${eye}" stroke-width="1.8" stroke-linecap="round"/>`;
    svg+=`<ellipse cx="58" cy="57" rx="1.6" ry="1.1" fill="${nose}"/>`;
    svg+=`<text x="76" y="36" font-family="DM Sans,sans-serif" font-size="8" fill="${mid}" opacity="0.8">z</text>`;
    svg+=`<text x="81" y="28" font-family="DM Sans,sans-serif" font-size="10" fill="${mid}" opacity="0.6">z</text>`;
    svg+=`<text x="87" y="20" font-family="DM Sans,sans-serif" font-size="12" fill="${mid}" opacity="0.4">z</text>`;
  }
  return svg+'</svg>';
}

function renderCats(){
  document.getElementById('cats-month-label').textContent=MONTHS[catsMonth]+' '+catsYear;
  const grid=document.getElementById('cat-grid'),empty=document.getElementById('cats-empty');
  if(habits.length===0){empty.style.display='block';grid.innerHTML='';return;}
  empty.style.display='none';
  const isFuture=(catsYear>TODAY.getFullYear())||(catsYear===TODAY.getFullYear()&&catsMonth>TODAY.getMonth());
  grid.innerHTML=habits.map(h=>{
    const{count,total}=monthCompletions(h,catsYear,catsMonth);
    const pct=isFuture?0:count/total;
    const stage=pct===0?0:pct<0.2?1:pct<0.4?2:pct<0.6?3:pct<0.8?4:5;
    return`<div class="cat-card">${drawCat(pct,h.color,100)}<div class="cat-name" title="${h.name}">${h.name}</div><div class="cat-pct">${isFuture?'—':Math.round(pct*100)+'%'}</div><div class="cat-sub">${isFuture?'future':count+' / '+total+' days'}</div><div class="cat-mood">${MOODS[stage]}</div><div class="pct-bar"><div class="pct-bar-fill" style="width:${Math.round(pct*100)}%;background:${h.color};"></div></div></div>`;
  }).join('');
}

function renderDashboard(){
  document.getElementById('dash-month-label').textContent=MONTHS[dashMonth]+' '+dashYear;
  document.getElementById('dash-month-progress-label').textContent=MONTHS[dashMonth]+' progress';
  const doneToday=habits.filter(h=>h.done[todayKey]).length,total=habits.length;
  const mDaysTotal=daysInMonth(dashYear,dashMonth);
  const mCount=habits.reduce((s,h)=>s+monthCompletions(h,dashYear,dashMonth).count,0);
  const mPossible=habits.length*mDaysTotal;
  document.getElementById('dash-summary').innerHTML=`<div class="dash-card"><div class="dash-val">${total}</div><div class="dash-label">Habits</div></div><div class="dash-card"><div class="dash-val">${doneToday}/${total}</div><div class="dash-label">Today</div></div><div class="dash-card"><div class="dash-val">${mPossible>0?Math.round(mCount/mPossible*100):0}%</div><div class="dash-label">${MONTHS[dashMonth].slice(0,3)} rate</div></div>`;
  const isThisMonth=dashYear===TODAY.getFullYear()&&dashMonth===TODAY.getMonth();
  if(habits.length===0){document.getElementById('dash-today').innerHTML='<div style="color:var(--muted);font-size:13px;padding:0.5rem 0 1rem;">No habits yet.</div>';document.getElementById('dash-bars').innerHTML='';return;}
  document.getElementById('dash-today').innerHTML=isThisMonth?habits.map(h=>{const done=h.done[todayKey];return`<div class="today-item${done?' checked':''}" onclick="toggleTodayDash(${h.id})"><div class="check-circle" style="${done?'background:'+h.color:''}">${done?'&#10003;':''}</div><span class="today-name">${h.name}</span></div>`;}).join(''):'<div style="color:var(--muted);font-size:13px;padding:0.5rem 0 1rem;">Go to the current month to check off today\'s habits.</div>';
  document.getElementById('dash-bars').innerHTML=habits.map(h=>{const{count}=monthCompletions(h,dashYear,dashMonth),pct=Math.round(count/mDaysTotal*100);return`<div class="bar-row"><div class="color-pip" style="background:${h.color};width:9px;height:9px;border-radius:50%;flex-shrink:0;"></div><div style="font-size:13px;color:var(--ink);width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;">${h.name}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${h.color};"></div></div><div class="bar-pct">${pct}%</div></div>`;}).join('');
}

function renderHabits(){
  const list=document.getElementById('habits-list'),empty=document.getElementById('empty-msg');
  if(habits.length===0){list.innerHTML='';list.appendChild(empty);empty.style.display='block';return;}
  empty.style.display='none';
  const days=[];for(let i=27;i>=0;i--){const d=new Date(TODAY);d.setDate(TODAY.getDate()-i);days.push(d);}
  const y=TODAY.getFullYear(),m=TODAY.getMonth(),mDaysTotal=daysInMonth(y,m);
  list.innerHTML=habits.map(h=>{
    const{count}=monthCompletions(h,y,m),pct=Math.round(count/mDaysTotal*100);
    const cells=days.map(d=>{
      const key=dateKey(d),isToday=d.getTime()===TODAY.getTime(),isFuture=d>TODAY,done=h.done[key];
      let cls='day-cell';if(done)cls+=' done';if(isToday)cls+=' today';if(isFuture)cls+=' future';
      const dayNum=d.getDate();
      // Pass element reference directly via onclick
      return`<div class="${cls}" style="${done?'background:'+h.color:''}" onclick="toggleDay(${h.id},'${key}',this,'${h.color}')" title="${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}">${!done?dayNum:''}</div>`;
    }).join('');
    return`<div class="habit-card"><div class="habit-head"><div class="color-pip" style="background:${h.color}"></div><span class="habit-name">${h.name}</span><button class="del-btn" onclick="deleteHabit(${h.id})">&#x2715;</button></div><div class="month-lbl">Last 28 days — tap to toggle</div><div class="grid">${cells}</div><div class="stats-row"><div class="stat"><div class="stat-label">This month</div><div class="stat-val">${count}/${mDaysTotal}</div></div><div class="stat"><div class="stat-label">Monthly rate</div><div class="stat-val">${pct}%</div></div></div></div>`;
  }).join('');
}

renderCats();renderDashboard();renderHabits();
</script>
